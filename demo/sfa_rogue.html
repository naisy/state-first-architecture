    next_transitions: [
      { event: "AUTO", guard: "enemy_intent_is_attack", action: "apply_enemy_attack_intent", target_state: "ENEMY_DONE" },
      { event: "AUTO", guard: "enemy_intent_is_move", action: "apply_enemy_move_intent", target_state: "ENEMY_DONE" },
      { event: "AUTO", guard: "always", action: "set_enemy_wait_intent", target_state: "ENEMY_DONE" }
    ]
  },
  ENEMY_DONE: { role: "shared", next_transitions: [] }
});

function runLocalSfa(definitions, initialState, event, localContext, localGuards, localActions, maxTransitions = 32) {
  let state = initialState;
  let pendingEvent = event;
  let transitionCount = 0;
  const trace = [];
  while (transitionCount < maxTransitions) {
    const definition = definitions[state];
    if (!definition) throw new Error(`Unknown local SFA state: ${state}`);
    const candidates = (definition.next_transitions || []).filter(candidate => candidate.event === pendingEvent);
    let selected = null;
    for (const candidate of candidates) {
      if (!candidate.guard || localGuards[candidate.guard](localContext)) { selected = candidate; break; }
    }
    if (!selected) break;
    if (selected.action) localActions[selected.action](localContext);
    trace.push({ from: state, event: pendingEvent, guard: selected.guard || null, action: selected.action || null, to: selected.target_state });
    state = selected.target_state;
    transitionCount += 1;
    pendingEvent = "AUTO";
  }
  if (transitionCount >= maxTransitions) throw new Error(`Local SFA exceeded ${maxTransitions} transitions`);
  return { state, trace };
}

function createEnemyDecisionRuntime(ctx, enemy, blastThreatened) {
  return { ctx, enemy, blastThreatened, perception: null, movementMode: 'chase', intent: null, trace: [] };
}

function evaluateEnemyPerception(ctx, enemy) {
  if (enemy.isFoodEnemy && !enemy.provoked) return { detected: false, clearPendingSpell: true };
  if (enemy.isFoodEnemy && enemy.provoked) return { detected: true, clearPendingSpell: false };
  if (enemy.pendingSpell) return { detected: true, clearPendingSpell: false };
  const distance = Math.abs(ctx.player.x - enemy.x) + Math.abs(ctx.player.y - enemy.y);
  return {
    detected: distance <= enemyVisionRange(enemy) && hasClearSightToPlayer(ctx, enemy),
    clearPendingSpell: false
  };
}

const enemyDecisionGuards = {
  always: () => true,
  enemy_is_detected: runtime => Boolean(runtime.perception?.detected),
  enemy_is_passive_food: runtime => runtime.enemy.isFoodEnemy === true && runtime.enemy.provoked !== true,
  enemy_can_arm_mirror: runtime => runtime.enemy.abyssRole === 'mirror' && playerBombs(runtime.ctx).some(bomb => !(bomb.reflectedForBossIds || []).includes(runtime.enemy.id)),
  enemy_can_resolve_hunger: runtime => runtime.enemy.abyssRole === 'hunger' && runtime.ctx.turnCount % 3 === 0 && runtime.ctx.items.some(item => item.type === 'food' && (item.rarity || 'common') !== 'ultra_rare'),
  enemy_can_resolve_devourer: runtime => runtime.enemy.abyssRole === 'devourer' && runtime.ctx.turnCount % 4 === 0 && runtime.ctx.items.some(item => item.type === 'food' && (item.rarity || 'common') !== 'ultra_rare'),
  enemy_has_pending_spell: runtime => Boolean(runtime.enemy.pendingSpell),
  enemy_can_prepare_spell: runtime => canPrepareEnemySpell(runtime.ctx, runtime.enemy),
  enemy_is_adjacent: runtime => Math.abs(runtime.ctx.player.x - runtime.enemy.x) + Math.abs(runtime.ctx.player.y - runtime.enemy.y) === 1,
  enemy_can_attempt_move: runtime => !(runtime.enemy.abyssRole === 'warden' && Math.abs(runtime.ctx.player.x - runtime.enemy.x) + Math.abs(runtime.ctx.player.y - runtime.enemy.y) > 4),
  enemy_intent_is_attack: runtime => runtime.intent?.type === 'ATTACK',
  enemy_intent_is_move: runtime => runtime.intent?.type === 'MOVE'
};

function canPrepareEnemySpell(ctx, enemy) {
  if (!enemy.magicType || enemy.pendingSpell || ctx.turnCount % enemy.magicEvery !== 0) return false;
  if (enemy.magicType !== 'line') return true;
  return enemy.y === ctx.player.y || enemy.x === ctx.player.x;
}

function buildEnemyMoveIntent(ctx, enemy, blastThreatened) {
  const next = chooseEnemyChaseStep(ctx, enemy, blastThreatened);
  if (!next || (ctx.player.x === next.x && ctx.player.y === next.y)) return null;
  return { type: 'MOVE', to: { x: next.x, y: next.y }, reason: next.reason || enemyMovementPolicy(enemy) };
}

function buildPassiveFoodWanderIntent(ctx, enemy) {
  const wanderChance = Math.max(0, Math.min(1, Number(enemy.passiveWanderChance) || 0));
  if (Math.random() >= wanderChance) return null;
  const directions = [
    { x: 1, y: 0 },
    { x: 0, y: 1 },
    { x: -1, y: 0 },
    { x: 0, y: -1 }
  ];
  const startIndex = Math.floor(Math.random() * directions.length);
  for (let offset = 0; offset < directions.length; offset++) {
    const direction = directions[(startIndex + offset) % directions.length];
    const nextX = enemy.x + direction.x;
    const nextY = enemy.y + direction.y;
    if (ctx.player.x === nextX && ctx.player.y === nextY) continue;
    if (!isEnemyMovementCellBlocked(ctx, enemy, nextX, nextY)) {
      return { type: 'MOVE', to: { x: nextX, y: nextY }, reason: 'PASSIVE_WANDER' };
    }
  }
  return null;
}

const enemyDecisionActions = {
  evaluate_enemy_perception: runtime => { runtime.perception = evaluateEnemyPerception(runtime.ctx, runtime.enemy); },
  apply_enemy_detected: runtime => { runtime.enemy.hasDetectedPlayer = true; runtime.movementMode = 'chase'; },
  set_enemy_passive_wander_mode: runtime => {
    runtime.enemy.hasDetectedPlayer = false;
    if (runtime.perception?.clearPendingSpell) runtime.enemy.pendingSpell = null;
    runtime.movementMode = 'passive_wander';
  },
  apply_enemy_not_detected_and_wait: runtime => {
    runtime.enemy.hasDetectedPlayer = false;
    if (runtime.perception?.clearPendingSpell) runtime.enemy.pendingSpell = null;
    runtime.intent = { type: 'WAIT', reason: 'NO_APPLICABLE_ACTION' };
  },
  set_enemy_wait_intent: runtime => { runtime.intent = { type: 'WAIT', reason: 'NO_APPLICABLE_ACTION' }; },
  apply_enemy_mirror: runtime => { armMirrorReflections(runtime.ctx, runtime.enemy); },
  apply_enemy_hunger: runtime => { resolveHungerRole(runtime.ctx, runtime.enemy); },
  apply_enemy_devourer: runtime => { resolveDevourerRole(runtime.ctx, runtime.enemy); },
  apply_enemy_pending_spell: runtime => { resolvePendingSpell(runtime.ctx, runtime.enemy); },
  apply_enemy_prepare_spell: runtime => { prepareEnemySpell(runtime.ctx, runtime.enemy); },
  set_enemy_attack_intent: runtime => { runtime.intent = { type: 'ATTACK', reason: 'ADJACENT_PLAYER' }; },
  evaluate_enemy_move_intent: runtime => {
    runtime.intent = runtime.movementMode === 'passive_wander'
      ? buildPassiveFoodWanderIntent(runtime.ctx, runtime.enemy)
      : buildEnemyMoveIntent(runtime.ctx, runtime.enemy, runtime.blastThreatened);
  },
  apply_enemy_attack_intent: runtime => {
    const { ctx, enemy } = runtime;
    const finalDmg = enemyDamageAgainstPlayer(ctx, enemy);
    ctx.player.hp = Math.max(0, ctx.player.hp - finalDmg);
    ctx.player.hpFlow = "damaged";
    addLog(ctx, `${enemy.name} strikes you for ${finalDmg} damage!`);
    if (enemy.abyssRole === 'hunger') {
      const drained = Math.min(ctx.player.hunger, 8);
      ctx.player.hunger = Math.max(0, ctx.player.hunger - drained);
      const healed = Math.max(1, Math.floor(enemy.maxHp * 0.02));
      enemy.hp = Math.min(enemy.maxHp, enemy.hp + healed);
      addLog(ctx, `${enemy.name} drained ${drained.toFixed(1)} Hunger and restored ${healed} HP.`);
    }
    if (enemy.archetype === "Venom Bat" && Math.random() < 0.22) {
      ctx.player.statusEffects = ctx.player.statusEffects || { poisonTurns: 0 };
      ctx.player.statusEffects.poisonTurns = Math.max(ctx.player.statusEffects.poisonTurns || 0, 5);
      addLog(ctx, "Venom courses through your body!");
    }
  },
  apply_enemy_move_intent: runtime => {
    runtime.enemy.x = runtime.intent.to.x;
    runtime.enemy.y = runtime.intent.to.y;
  }
};

function executeEnemyDecisionSfa(ctx, enemy, blastThreatened) {
  const runtime = createEnemyDecisionRuntime(ctx, enemy, blastThreatened);
  const result = runLocalSfa(ENEMY_DECISION_SFA, 'ENEMY_SENSE', 'DECIDE', runtime, enemyDecisionGuards, enemyDecisionActions);
  runtime.trace = result.trace;
  ctx.lastEnemyDecision = {
    enemyId: enemy.id,
    archetype: enemy.archetype,
    movementPolicy: enemyMovementPolicy(enemy),
    intent: runtime.intent ? { ...runtime.intent } : null,
    trace: result.trace
  };
  return runtime;
}

function isCombatActive(ctx) {
  return ctx.enemies.some(enemy => enemy.hasDetectedPlayer === true || enemy.pendingSpell);
}


const TURN_LIFECYCLE_SFA = Object.freeze({
  TURN_LIFECYCLE_REQUESTED: {
    role: "shared",
    next_transitions: [
      { event: "PROCESS", action: "advance_turn_clock", target_state: "TURN_LIFECYCLE_BOMBS" }
    ]
  },
  TURN_LIFECYCLE_BOMBS: {
    role: "shared",
    next_transitions: [
      { event: "AUTO", action: "process_turn_bombs", target_state: "TURN_LIFECYCLE_STATUS_PREPARE" }
    ]
  },
  TURN_LIFECYCLE_STATUS_PREPARE: {
    role: "shared",
    next_transitions: [
      { event: "AUTO", action: "prepare_turn_status", target_state: "TURN_LIFECYCLE_POISON" }
    ]
  },
  TURN_LIFECYCLE_POISON: {
    role: "shared",
    next_transitions: [
      { event: "AUTO", guard: "turn_has_poison", action: "apply_turn_poison", target_state: "TURN_LIFECYCLE_HUNGER" },
      { event: "AUTO", guard: "always", target_state: "TURN_LIFECYCLE_HUNGER" }
    ]
  },
  TURN_LIFECYCLE_HUNGER: {
    role: "shared",
    next_transitions: [
      { event: "AUTO", guard: "turn_is_starving", action: "apply_turn_starvation", target_state: "TURN_LIFECYCLE_RECOVERY" },
      { event: "AUTO", guard: "always", target_state: "TURN_LIFECYCLE_RECOVERY" }
    ]
  },
  TURN_LIFECYCLE_RECOVERY: {
    role: "shared",
    next_transitions: [
      { event: "AUTO", guard: "turn_can_recover", action: "apply_turn_recovery", target_state: "TURN_LIFECYCLE_DONE" },
      { event: "AUTO", guard: "always", target_state: "TURN_LIFECYCLE_DONE" }
    ]
  },
  TURN_LIFECYCLE_DONE: { role: "shared", next_transitions: [] }
});

function createTurnLifecycleRuntime(ctx) {
  return { ctx, poisonWasActive: false, trace: [] };
}

const turnLifecycleGuards = {
  always: () => true,
  turn_has_poison: runtime => runtime.poisonWasActive,
  turn_is_starving: runtime => runtime.ctx.player.hunger <= 0,
  turn_can_recover: runtime => !runtime.poisonWasActive && runtime.ctx.player.hunger > 0 && !isCombatActive(runtime.ctx) && runtime.ctx.player.hp < runtime.ctx.player.maxHp
};

const turnLifecycleActions = {
  advance_turn_clock: runtime => {
    const ctx = runtime.ctx;
    ctx.turnCount++;
    if (ctx.turnCount % 12 === 0) {
      ctx.timePhase = (ctx.timePhase + 1) % 6;
      addLog(ctx, `The environment shifts into [${TIME_NAMES[ctx.timePhase]}].`);
      if (ctx.currentMapType === "town") {
        if (ctx.timePhase >= 3) spawnTownNightForce(ctx, ctx.timePhase);
        else ctx.enemies = ctx.enemies.filter(enemy => !enemy.isTownEnemy);
      }
    }
  },
  process_turn_bombs: runtime => { processBombLifecycle(runtime.ctx); },
  prepare_turn_status: runtime => {
    const ctx = runtime.ctx;
    ctx.player.hpFlow = "stable";
    ctx.player.statusEffects = ctx.player.statusEffects || { poisonTurns: 0 };
    ctx.player.hunger = Math.max(0, ctx.player.hunger - BALANCE_CONFIG.hungerPerTurn);
    runtime.poisonWasActive = ctx.player.statusEffects.poisonTurns > 0;
  },
  apply_turn_poison: runtime => {
    const ctx = runtime.ctx;
    const poisonDamage = ctx.player.maxHp * BALANCE_CONFIG.poisonDamageRate;
    ctx.player.hp = Math.max(0, ctx.player.hp - poisonDamage);
    ctx.player.statusEffects.poisonTurns -= 1;
    ctx.player.hpFlow = "poisoned";
    if (ctx.turnCount % 3 === 0) addLog(ctx, `Poison drained ${poisonDamage.toFixed(2)} HP.`);
  },
  apply_turn_starvation: runtime => {
    const ctx = runtime.ctx;
    const starvationDamage = ctx.player.maxHp * BALANCE_CONFIG.starvationDamageRate;
    ctx.player.hp = Math.max(0, ctx.player.hp - starvationDamage);
    if (ctx.player.hpFlow !== "poisoned") ctx.player.hpFlow = "starving";
    if (ctx.turnCount % 3 === 0) addLog(ctx, `Starvation drained ${starvationDamage.toFixed(2)} HP.`);
  },
  apply_turn_recovery: runtime => {
    const ctx = runtime.ctx;
    const recovery = ctx.player.maxHp * BALANCE_CONFIG.satiatedRegenRate;
    const beforeHp = ctx.player.hp;
    ctx.player.hp = Math.min(ctx.player.maxHp, ctx.player.hp + recovery);
    if (ctx.player.hp > beforeHp) {
      ctx.player.hpFlow = "recovering";
      if (ctx.turnCount % 5 === 0) addLog(ctx, `Out of combat, satiation restored ${(ctx.player.hp - beforeHp).toFixed(2)} HP.`);
    }
  }
};

function executeTurnLifecycleSfa(ctx) {
  const runtime = createTurnLifecycleRuntime(ctx);
  const result = runLocalSfa(TURN_LIFECYCLE_SFA, "TURN_LIFECYCLE_REQUESTED", "PROCESS", runtime, turnLifecycleGuards, turnLifecycleActions);
  runtime.trace = result.trace;
  ctx.lastTurnLifecycleDecision = {
    turn: ctx.turnCount,
    poisonWasActive: runtime.poisonWasActive,
    starving: ctx.player.hunger <= 0,
    combatActive: isCombatActive(ctx),
    hpFlow: ctx.player.hpFlow,
    trace: result.trace.map(step => ({ ...step }))
  };
  return runtime;
}


const MAP_GENERATION_SFA = Object.freeze({
  MAP_GENERATION_REQUESTED: {
    next_transitions: [
      { event: "GENERATE", action: "reset_and_generate_map_layout", target_state: "MAP_LAYOUT_GENERATED" }
    ]
  },
  MAP_LAYOUT_GENERATED: {
    next_transitions: [
      { event: "AUTO", action: "place_map_entities", target_state: "MAP_ENTITIES_PLACED" }
    ]
  },
  MAP_ENTITIES_PLACED: {
    next_transitions: [
      { event: "AUTO", action: "validate_map_route", target_state: "MAP_VALIDATED" }
    ]
  },
  MAP_VALIDATED: {
    next_transitions: [
      { event: "AUTO", guard: "map_requires_repair", action: "repair_map_route", target_state: "MAP_REPAIRED" },
      { event: "AUTO", guard: "always", target_state: "MAP_READY" }
    ]
  },
  MAP_REPAIRED: {
    next_transitions: [
      { event: "AUTO", target_state: "MAP_READY" }
    ]
  },
  MAP_READY: { next_transitions: [] }
});

function createMapGenerationRuntime(ctx) {
  return {
    ctx,
    mapKind: ctx.currentMapType === "town" ? "town" : (isHighDifficultyDungeon(ctx) ? "abyss" : "standard"),
    start: null,
    stairs: null,
    effectiveDepth: ctx.depth,
    isBossFloor: false,
    regularEnemyCount: 0,
    routeReachable: true,
    repairRequired: false,
    trace: []
  };
}

const mapGenerationGuards = {
  always: () => true,
  map_requires_repair: runtime => runtime.repairRequired
};

const mapGenerationActions = {
  reset_and_generate_map_layout: runtime => {
    const ctx = runtime.ctx;
    ctx.tiles = {};
    ctx.enemies = [];
    ctx.items = [];
    ctx.bombs = [];
    ctx.explosionCells = [];
    if (runtime.mapKind === "town") {
      ctx.grid = Array(15).fill(null).map(() => Array(15).fill(0));
      for (let i = 0; i < 15; i++) {
        ctx.grid[0][i] = 2; ctx.grid[14][i] = 2;
        ctx.grid[i][0] = 2; ctx.grid[i][14] = 2;
      }
      ctx.player.x = 7; ctx.player.y = 12;
      ctx.tiles["3,3"] = "inn";
      ctx.tiles["11,3"] = "shop";
      ctx.tiles["3,11"] = "bar";
      ctx.tiles["11,11"] = "stairs";
      ctx.tiles["7,3"] = ctx.homePurchased ? "home" : "home_for_sale";
      if (hasClearedBlacksmithMilestone(ctx)) {
        ctx.tiles["7,11"] = "smith";
        ctx.tiles["3,7"] = "dark_smith";
        ctx.tiles["11,7"] = "abyss_gate";
      } else {
        ctx.tiles["7,11"] = "smith_closed";
      }
      for (let x = 5; x <= 9; x++) ctx.grid[6][x] = 2;
      return;
    }

    runtime.start = { x: 2, y: 2 };
    runtime.stairs = { x: 12, y: 12 };
    ctx.player.x = runtime.start.x;
    ctx.player.y = runtime.start.y;

    if (runtime.mapKind === "abyss") {
      runtime.effectiveDepth = abyssEffectiveDepth(ctx.depth);
      runtime.isBossFloor = ctx.depth % ABYSS_CONFIG.bossInterval === 0;
      ctx.grid = generateReachableDungeonGrid(runtime.start, runtime.stairs, runtime.effectiveDepth);
      ctx.tiles[coordinateKey(runtime.stairs.x, runtime.stairs.y)] = "stairs";
      ctx.grid[runtime.stairs.y][runtime.stairs.x] = 0;
      ctx.maxReachedAbyssDepth = Math.max(ctx.maxReachedAbyssDepth, ctx.depth);
      if (ctx.depth % ABYSS_CONFIG.returnWarpInterval === 0) {
        const warp = { x: 2, y: 12 };
        carveGuaranteedPath(ctx.grid, runtime.start, warp);
        ctx.tiles[coordinateKey(warp.x, warp.y)] = "town_warp";
        ctx.grid[warp.y][warp.x] = 0;
      }
      return;
    }

    runtime.isBossFloor = ctx.depth % 5 === 0;
    ctx.grid = generateReachableDungeonGrid(runtime.start, runtime.stairs, ctx.depth);
    ctx.tiles[coordinateKey(runtime.stairs.x, runtime.stairs.y)] = "stairs";
    ctx.grid[runtime.stairs.y][runtime.stairs.x] = 0;
    ctx.maxReachedDepth = Math.max(ctx.maxReachedDepth, ctx.depth);
    if (runtime.isBossFloor) {
      const warp = { x: 2, y: 12 };
      carveGuaranteedPath(ctx.grid, runtime.start, warp);
      ctx.tiles[coordinateKey(warp.x, warp.y)] = "town_warp";
      ctx.grid[warp.y][warp.x] = 0;
    }
  },
  place_map_entities: runtime => {
    const ctx = runtime.ctx;
    if (runtime.mapKind === "town") {
      if (ctx.timePhase >= 3) spawnTownNightForce(ctx, ctx.timePhase);
      return;
    }

    if (runtime.mapKind === "abyss") {
      if (runtime.isBossFloor) {
        const bossPos = getEmptyReachableFloorPos(ctx) || { x: 8, y: 8 };
        ctx.enemies.push({ ...createAbyssBoss(ctx, ctx.depth), x: bossPos.x, y: bossPos.y });
        addLog(ctx, `${ctx.enemies[ctx.enemies.length - 1].name} blocks descent on A${ctx.depth}.`);
      }
      const profile = { id: "abyss", label: "Abyssal", budgetMultiplier: 1.0 };
      let remainingThreat = regularEnemyBudget(runtime.effectiveDepth, profile, runtime.isBossFloor, "abyss");
      const counts = {};
      let index = 0;
      while (remainingThreat >= 1.5 && index < ABYSS_CONFIG.maxRegularEnemies) {
        const archetype = chooseAbyssArchetype(counts, Math.random(), ctx.depth);
        const pos = getEmptyReachableFloorPos(ctx);
        if (!pos) break;
        ctx.enemies.push({ ...createAbyssEnemy(ctx, ctx.depth, 700000 + ctx.depth * 100 + index, archetype), x: pos.x, y: pos.y });
        counts[archetype.name] = (counts[archetype.name] || 0) + 1;
        remainingThreat -= archetype.threatCost;
        index++;
      }
      runtime.regularEnemyCount = index;
      const chestPos = getEmptyReachableFloorPos(ctx);
      if (chestPos) ctx.items.push({ x: chestPos.x, y: chestPos.y, ...createTreasureChest(ctx) });
      const itemCount = 3 + Math.min(3, Math.floor(ctx.depth / 10));
      for (let i = 0; i < itemCount; i++) {
        const pos = getEmptyReachableFloorPos(ctx);
        if (!pos) break;
        if (Math.random() < 0.42) ctx.items.push({ x: pos.x, y: pos.y, ...generateConsumable(runtime.effectiveDepth, "rare") });
        else {
          const type = Math.random() < 0.5 ? "weapon" : "armor";
          const rarity = promoteRarity(rollRarity(ctx, runtime.effectiveDepth, false));
          ctx.items.push({ x: pos.x, y: pos.y, ...generateRandomEquipment(runtime.effectiveDepth, type, 1.08, rarity) });
        }
      }
      addLog(ctx, `A${ctx.depth}: ${index} abyss enemies patrol this unstable floor.`);
      return;
    }

    if (runtime.isBossFloor) {
      const bossPos = getEmptyReachableFloorPos(ctx) || { x: 8, y: 8 };
      ctx.grid[bossPos.y][bossPos.x] = 0;
      ctx.enemies.push({ ...createBoss(ctx, ctx.depth), x: bossPos.x, y: bossPos.y });
      if (ctx.defeatedBossFloors.includes(ctx.depth)) {
        addLog(ctx, `The B${ctx.depth} guardian has returned with the reconstructed floor. Defeat it again to descend.`);
      } else {
        addLog(ctx, `A floor guardian blocks descent on B${ctx.depth}. Defeat it or use the cyan warp to retreat.`);
      }
    }

    const foodEnemyCount = Math.min(BALANCE_CONFIG.maxFoodEnemies, BALANCE_CONFIG.minFoodEnemies + Math.floor(ctx.depth / 120));
    for (let i = 0; i < foodEnemyCount; i++) {
      const pos = getEmptyReachableFloorPos(ctx);
      if (!pos) break;
      ctx.enemies.push({ ...createFoodEnemy(ctx, ctx.depth, ctx.depth * 1000 + i), x: pos.x, y: pos.y });
    }

    const threatProfile = rollMapThreatProfile();
    ctx.mapThreatProfile = threatProfile.id;
    let remainingThreat = regularEnemyBudget(ctx.depth, threatProfile, runtime.isBossFloor, ctx.dungeonMode);
    const archetypeCounts = {};
    let regularIndex = 0;
    while (remainingThreat >= 0.55 && regularIndex < BALANCE_CONFIG.maxRegularEnemies) {
      const base = chooseEnemyArchetype(ctx.depth, archetypeCounts);
      if (base.threatCost > remainingThreat && regularIndex >= 3) break;
      const pos = getEmptyReachableFloorPos(ctx);
      if (!pos) break;
      const enemy = createEnemy(ctx, ctx.depth, ctx.depth * 100 + regularIndex, null, base);
      ctx.enemies.push({ ...enemy, x: pos.x, y: pos.y });
      archetypeCounts[base.name] = (archetypeCounts[base.name] || 0) + 1;
      remainingThreat -= base.threatCost;
      regularIndex++;
    }
    runtime.regularEnemyCount = regularIndex;
    enforceMapThreatColorMix(ctx, threatProfile);
    if (!runtime.isBossFloor && threatProfile.id !== "standard") {
      addLog(ctx, `${threatProfile.label} floor: enemy force ${regularIndex}, threat budget ${regularEnemyBudget(ctx.depth, threatProfile, false, ctx.dungeonMode).toFixed(1)}.`);
    }

    const shouldSpawnChest = runtime.isBossFloor || Math.random() < TREASURE_CONFIG.chestSpawnChance;
    if (shouldSpawnChest) {
      const chestPos = getEmptyReachableFloorPos(ctx);
      if (chestPos) ctx.items.push({ x: chestPos.x, y: chestPos.y, ...createTreasureChest(ctx) });
    }
    const itemCount = Math.min(5, 2 + Math.floor(ctx.depth / 80));
    for (let i = 0; i < itemCount; i++) {
      const pos = getEmptyReachableFloorPos(ctx);
      if (!pos) break;
      if (Math.random() < 0.55) ctx.items.push({ x: pos.x, y: pos.y, ...generateConsumable(ctx.depth) });
      else {
        const eqType = Math.random() > 0.5 ? "weapon" : "armor";
        ctx.items.push({ x: pos.x, y: pos.y, ...generateRandomEquipment(ctx.depth, eqType) });
      }
    }
  },
  validate_map_route: runtime => {
    if (runtime.mapKind === "town") {
      runtime.routeReachable = true;
      runtime.repairRequired = false;
      return;
    }
    runtime.routeReachable = hasWalkablePath(runtime.ctx.grid, runtime.start, runtime.stairs);
    runtime.repairRequired = !runtime.routeReachable;
  },
  repair_map_route: runtime => {
    const ctx = runtime.ctx;
    carveGuaranteedPath(ctx.grid, runtime.start, runtime.stairs);
    runtime.routeReachable = hasWalkablePath(ctx.grid, runtime.start, runtime.stairs);
    runtime.repairRequired = false;
    if (runtime.mapKind === "standard") addLog(ctx, "Map validator repaired an unreachable stair route.");
  }
};

function executeMapGenerationSfa(ctx) {
  const runtime = createMapGenerationRuntime(ctx);
  const result = runLocalSfa(MAP_GENERATION_SFA, "MAP_GENERATION_REQUESTED", "GENERATE", runtime, mapGenerationGuards, mapGenerationActions);
  runtime.trace = result.trace;
  ctx.lastMapGenerationDecision = {
    mapKind: runtime.mapKind,
    depth: ctx.depth,
    isBossFloor: runtime.isBossFloor,
    regularEnemyCount: runtime.regularEnemyCount,
    routeReachable: runtime.mapKind === "town" ? true : hasWalkablePath(ctx.grid, runtime.start, runtime.stairs),
    trace: result.trace.map(step => ({ ...step }))
  };
  return runtime;
}

// ==========================================
// 4. ガード（判定純粋関数群）
// ==========================================
const guards = {
  is_player_dead:    (ctx) => ctx.player.hp <= 0,
  is_player_won:     () => false,
  is_player_alive:   (ctx) => ctx.player.hp > 0,

  has_discovered_warps_at_town_stairs: (ctx) => ctx.currentMapType === "town" && ctx.tiles[`${ctx.player.x},${ctx.player.y}`] === "stairs" && ctx.discoveredWarpFloors.length > 0,
  can_use_stairs:    (ctx) => ctx.tiles[`${ctx.player.x},${ctx.player.y}`] === "stairs" && !ctx.enemies.some(e => e.isBoss),
  is_on_town_warp:   (ctx) => ctx.tiles[`${ctx.player.x},${ctx.player.y}`] === "town_warp",
  is_on_shop_tile:   (ctx) => ctx.tiles[`${ctx.player.x},${ctx.player.y}`] === "shop",
  is_on_inn_tile:    (ctx) => ctx.tiles[`${ctx.player.x},${ctx.player.y}`] === "inn",
  is_on_bar_tile:    (ctx) => ctx.tiles[`${ctx.player.x},${ctx.player.y}`] === "bar",
  is_on_unpurchased_home_tile: (ctx) => ctx.tiles[`${ctx.player.x},${ctx.player.y}`] === "home_for_sale" && !ctx.homePurchased,
  is_on_home_tile:   (ctx) => ctx.tiles[`${ctx.player.x},${ctx.player.y}`] === "home" && ctx.homePurchased,
  is_on_closed_smith_tile: (ctx) => ctx.tiles[`${ctx.player.x},${ctx.player.y}`] === "smith_closed" && !hasClearedBlacksmithMilestone(ctx),
  is_on_smith_tile:  (ctx) => ctx.tiles[`${ctx.player.x},${ctx.player.y}`] === "smith" && hasClearedBlacksmithMilestone(ctx),
  is_on_dark_smith_tile: (ctx) => ctx.tiles[`${ctx.player.x},${ctx.player.y}`] === "dark_smith" && hasClearedBlacksmithMilestone(ctx),
  is_on_abyss_gate:  (ctx) => ctx.tiles[`${ctx.player.x},${ctx.player.y}`] === "abyss_gate" && hasClearedBlacksmithMilestone(ctx),

  should_enemies_act: (ctx) => {
    // ダンジョン内、または夜間(Phase 3,4,5)の町なら敵が行動
    return ctx.currentMapType === "dungeon" || (ctx.currentMapType === "town" && ctx.timePhase >= 3);
  },
  should_enemies_sleep: (ctx) => {
    return ctx.currentMapType === "town" && ctx.timePhase < 3;
  },

  can_afford_shop_item: (ctx) => {
    const item = ctx.shopInventory[ctx.shopSelectedIndex];
    return item && item.stock > 0 && ctx.player.gold >= item.value;
  },
  can_use_return_scroll: (ctx) => ctx.currentMapType === "dungeon" && ctx.player.returnScrolls > 0,
  can_afford_inn: (ctx) => ctx.player.gold >= 20,
  can_afford_home_purchase: (ctx) => !ctx.homePurchased && ctx.player.gold >= HOME_CONFIG.purchasePrice,
  has_selected_warp_destination: (ctx) => ctx.warpDestinations.length > 0,
  has_selected_inventory_equipment: (ctx) => Boolean(ctx.equipmentInventory[ctx.inventorySelectedIndex]),
  home_selected_carried_equipment: (ctx) => ctx.homeMenuEntries[ctx.homeSelectedIndex]?.kind === 'carried',
  home_selected_stored_equipment: (ctx) => ctx.homeMenuEntries[ctx.homeSelectedIndex]?.kind === 'stored' && ctx.equipmentInventory.length < ctx.inventoryCapacity,
  home_selected_deposit_gold: (ctx) => ctx.homeMenuEntries[ctx.homeSelectedIndex]?.kind === 'deposit_gold' && ctx.player.gold > 0,
  home_selected_withdraw_gold: (ctx) => ctx.homeMenuEntries[ctx.homeSelectedIndex]?.kind === 'withdraw_gold' && ctx.homeStorage.gold > 0,
  can_attempt_dark_smith_upgrade: (ctx) => {
    const entry = ctx.darkSmithMenuEntries[ctx.darkSmithSelectedIndex];
    const option = entry?.item?.options?.[0];
    return Boolean(entry && option && ctx.forgeShards >= darkSmithMaterialCost(option));
  },
  has_selected_dark_smith_dismantle_item: (ctx) => Boolean(ctx.darkSmithDismantleEntries[ctx.darkSmithDismantleSelectedIndex]),
  has_selected_blacksmith_item: (ctx) => Boolean(ctx.blacksmithEntries[ctx.blacksmithSelectedIndex]),
  can_afford_blacksmith: (ctx) => Boolean(ctx.blacksmithEntries[ctx.blacksmithSelectedIndex]) && ctx.player.gold >= BLACKSMITH_CONFIG.rerollCost,
  has_blacksmith_proposal: (ctx) => Boolean(ctx.blacksmithProposal),
  can_place_bomb: (ctx) => ctx.currentMapType === "dungeon" && playerBombs(ctx).length < ctx.player.bombCapacity && !isBombAt(ctx, ctx.player.x, ctx.player.y)
};

      x: 7, y: 12, hp: 100, maxHp: 100, hunger: 100.999999, gold: 60,
      level: 1, exp: 0, nextExp: expToNextLevel(1), permanentMaxHpBonus: 0,
      weapon: { type: "weapon", name: "Rusty Sword", atk: 4, rank: "E", rarity: "common", value: 10 },
      armor: { type: "armor", name: "Ragged Cloth", def: 1, rank: "E", rarity: "common", value: 8 },
      bombCapacity: 1, bombRange: 1, bombRangeShopPurchases: 0, bombCapacityShopPurchases: 0, returnScrolls: 0,
      statusEffects: { poisonTurns: 0 }, hpFlow: "stable"
    };
    ctx.currentMapType = "town";
    ctx.dungeonMode = "standard";
    ctx.depth = 0;
    ctx.timePhase = 0;
    ctx.turnCount = 0;
    ctx.defeatedBossFloors = [];
    ctx.defeatedAbyssBossFloors = [];
    ctx.discoveredWarpFloors = [];
    ctx.warpDestinations = [1];
    ctx.warpSelectedIndex = 0;
    ctx.maxReachedDepth = 0;
    ctx.maxReachedAbyssDepth = 0;
    ctx.bombs = [];
    ctx.explosionCells = [];
    ctx.deathSummary = null;
    ctx.equipmentInventory = [];
    ctx.inventorySelectedIndex = 0;
    ctx.inventoryCapacity = 8;
    ctx.homePurchased = false;
    ctx.homeStorage = { equipment: [], gold: 0 };
    ctx.homeMenuEntries = [];
    ctx.homeSelectedIndex = 0;
    ctx.darkSmithMenuEntries = [];
    ctx.darkSmithSelectedIndex = 0;
    ctx.darkSmithDismantleEntries = [];
    ctx.darkSmithDismantleSelectedIndex = 0;
    ctx.forgeShards = 0;
    ctx.blacksmithEntries = [];
    ctx.blacksmithSelectedIndex = 0;
    ctx.blacksmithKindIndex = 0;
    ctx.blacksmithProposal = null;
    ctx.logs = [];
    addLog(ctx, "Welcome to SFA Rogue.");
    addLog(ctx, "Descend, survive, and reshape the dungeon with bombs.");
  },

  apply_death_penalty: (ctx) => {
    const deathFloor = ctx.depth;
    const deathDungeonMode = ctx.dungeonMode;
    const goldLost = Math.floor(ctx.player.gold * 0.25);
    const expLost = Math.floor(ctx.player.exp * 0.20);
    ctx.player.gold = Math.max(0, ctx.player.gold - goldLost);
    const divineGoldGranted = ctx.player.gold < 20 ? 20 - ctx.player.gold : 0;
    if (divineGoldGranted > 0) ctx.player.gold = 20;
    ctx.player.exp = Math.max(0, ctx.player.exp - expLost);
    ctx.player.hp = Math.max(1, Math.floor(ctx.player.maxHp * 0.50));
    ctx.player.hunger = 50.999999;
    ctx.player.statusEffects = { poisonTurns: 0 };
    ctx.player.hpFlow = "stable";
    ctx.currentMapType = "town";
    ctx.dungeonMode = "standard";
    ctx.depth = 0;
    ctx.timePhase = 0;
    ctx.bombs = [];
    ctx.explosionCells = [];
    ctx.enemies = [];
    ctx.items = [];
    ctx.tiles = {};
    ctx.deathSummary = {
      deathFloor,
      deathDungeonMode,
      goldLost,
      divineGoldGranted,
      goldAfterRescue: ctx.player.gold,
      expLost,
      level: ctx.player.level,
      weaponName: ctx.player.weapon.name,
      armorName: ctx.player.armor.name,
      bombRange: ctx.player.bombRange,
      bombCapacity: ctx.player.bombCapacity,
      warpCount: ctx.discoveredWarpFloors.length
    };
  },

  return_to_town_after_death: (ctx) => {
    addLog(ctx, `Rescued from ${ctx.deathSummary?.deathDungeonMode === 'abyss' ? 'A' : 'B'}${ctx.deathSummary ? ctx.deathSummary.deathFloor : 0}.`);
    if (ctx.deathSummary && ctx.deathSummary.divineGoldGranted > 0) {
      addLog(ctx, `The gods granted you ${ctx.deathSummary.divineGoldGranted} gold for one night at the Inn.`);
    }
    addLog(ctx, "Your level, equipment, bomb upgrades, and discovered warps were preserved.");
  },

  execute_map_generation: (ctx) => {
    executeMapGenerationSfa(ctx);
  },

  trigger_stairs: (ctx) => {
    if (ctx.currentMapType === "town") {
      ctx.currentMapType = "dungeon";
      ctx.dungeonMode = "standard";
      ctx.depth = 1;
      addLog(ctx, "You entered the endlessly shifting Underworld...");
    } else {
      const nextDepth = ctx.depth + 1;
      const label = ctx.dungeonMode === 'abyss' ? `A${nextDepth}` : `B${nextDepth}`;
      resolveBombsOnMapExit(ctx, label);
      ctx.depth = nextDepth;
      if (ctx.dungeonMode === 'abyss') {
        addLog(ctx, `Descended deeper into Abyss A${ctx.depth}.`);
        if (ctx.depth === 1000) addLog(ctx, "MILESTONE: You reached Abyss A1000.");
      } else {
        addLog(ctx, `Descended deeper into Floor B${ctx.depth}.`);
        if (ctx.depth === 1000) addLog(ctx, "MILESTONE: You reached the legendary B1000 floor!");
      }
    }
  },

  trigger_town_warp: (ctx) => {
    const departedFloor = ctx.depth;
    resolveBombsOnMapExit(ctx, "Town");
    if (ctx.dungeonMode === 'abyss') {
      ctx.currentMapType = 'town';
      ctx.dungeonMode = 'standard';
      ctx.depth = 0;
      addLog(ctx, `Returned safely from Abyss A${departedFloor}.`);
      return;
    }
    if (!ctx.discoveredWarpFloors.includes(departedFloor)) {
      ctx.discoveredWarpFloors.push(departedFloor);
      ctx.discoveredWarpFloors.sort((a, b) => a - b);
    }
    ctx.currentMapType = "town";
    ctx.dungeonMode = "standard";
    ctx.depth = 0;
    addLog(ctx, `Warp B${departedFloor} registered. You can revisit it from the town entrance.`);
  },

  prepare_warp_menu: (ctx) => {
    ctx.warpDestinations = [1, ...ctx.discoveredWarpFloors];
    ctx.warpSelectedIndex = Math.max(0, ctx.warpDestinations.indexOf(Math.max(...ctx.warpDestinations)));
  },
  warp_cursor_up: (ctx) => { ctx.warpSelectedIndex = Math.max(0, ctx.warpSelectedIndex - 1); },
  warp_cursor_down: (ctx) => { ctx.warpSelectedIndex = Math.min(ctx.warpDestinations.length - 1, ctx.warpSelectedIndex + 1); },
  enter_selected_warp: (ctx) => {
    const destination = ctx.warpDestinations[ctx.warpSelectedIndex] || 1;
    resolveBombsOnMapExit(ctx, `B${destination}`);
    ctx.currentMapType = "dungeon";
    ctx.dungeonMode = "standard";
    ctx.depth = destination;
    addLog(ctx, destination === 1 ? "You entered the Underworld from B1." : `The town gate reconstructed a new B${destination} map. Its guardian will return.`);
  },

  player_move_up:    (ctx) => { resolvePlayerMovement(ctx,  0, -1); },
  player_move_down:  (ctx) => { resolvePlayerMovement(ctx,  0,  1); },
  player_move_left:  (ctx) => { resolvePlayerMovement(ctx, -1,  0); },
  player_move_right: (ctx) => { resolvePlayerMovement(ctx,  1,  0); },
  player_pass_turn:  (ctx) => { pickupFloorItemAtPlayerPosition(ctx); addLog(ctx, "You wait and brace yourself."); },
  use_return_scroll: (ctx) => {
    if (ctx.currentMapType !== "dungeon" || ctx.player.returnScrolls <= 0) return;
    const departedMode = ctx.dungeonMode;
    const departedDepth = ctx.depth;
    resolveBombsOnMapExit(ctx, "Town");
    ctx.player.returnScrolls--;
    ctx.currentMapType = "town";
    ctx.dungeonMode = "standard";
    ctx.depth = 0;
    addLog(ctx, `The scroll carried you safely back from ${departedMode === "abyss" ? "A" : "B"}${departedDepth}.`);
  },
  place_bomb: (ctx) => {
    const id = `${ctx.turnCount}-${ctx.player.x}-${ctx.player.y}-${ctx.bombs.length}`;
    ctx.bombs.push({ id, x: ctx.player.x, y: ctx.player.y, fuse: BOMB_CONFIG.fuseTurns, range: ctx.player.bombRange, placedTurn: ctx.turnCount + 1, source: 'player', chainReactive: true });
    addLog(ctx, `Bomb placed. Detonation in ${BOMB_CONFIG.fuseTurns} turns. (${playerBombs(ctx).length}/${ctx.player.bombCapacity})`);
  },

  execute_enemy_ai: (ctx) => {
    const blastThreatened = (x, y) => ctx.bombs.some(bomb => {
      if (bomb.x === x && Math.abs(bomb.y - y) <= bomb.range) return true;
      if (bomb.y === y && Math.abs(bomb.x - x) <= bomb.range) return true;
      return false;
    });
    const turnProjection = {
      turn: ctx.turnCount,
      policy: { ...ENEMY_TURN_POLICY },
      decisions: []
    };
    [...ctx.enemies].forEach((enemy, orderIndex) => {
      if (!ctx.enemies.includes(enemy)) return;
      const runtime = executeEnemyDecisionSfa(ctx, enemy, blastThreatened);
      turnProjection.decisions.push({
        orderIndex,
        enemyId: enemy.id,
        archetype: enemy.archetype,
        movementPolicy: enemyMovementPolicy(enemy),
        intent: runtime.intent ? { ...runtime.intent } : null,
        trace: runtime.trace.map(step => ({ ...step }))
      });
    });
    ctx.lastEnemyTurnDecision = turnProjection;
  },

  process_turn_lifecycle: (ctx) => {
    executeTurnLifecycleSfa(ctx);
  },

  // --- 装備所持品ロジック ---
  prepare_inventory_menu: (ctx) => {
    ctx.inventorySelectedIndex = Math.min(ctx.inventorySelectedIndex, Math.max(0, ctx.equipmentInventory.length - 1));
  },
  inventory_cursor_up: (ctx) => {
    ctx.inventorySelectedIndex = Math.max(0, ctx.inventorySelectedIndex - 1);
  },
  inventory_cursor_down: (ctx) => {
    ctx.inventorySelectedIndex = Math.min(Math.max(0, ctx.equipmentInventory.length - 1), ctx.inventorySelectedIndex + 1);
  },
  equip_selected_inventory: (ctx) => {
    const selected = ctx.equipmentInventory[ctx.inventorySelectedIndex];
    if (!selected) return;
    if (selected.type === "weapon") {
      const previous = ctx.player.weapon;
      ctx.player.weapon = selected;
      ctx.equipmentInventory[ctx.inventorySelectedIndex] = previous;
      addLog(ctx, `Equipped ${selected.name}. Stored ${previous.name}.`);
    } else if (selected.type === "armor") {
      const previous = ctx.player.armor;
      ctx.player.armor = selected;
      ctx.equipmentInventory[ctx.inventorySelectedIndex] = previous;
      addLog(ctx, `Equipped ${selected.name}. Stored ${previous.name}.`);
    }
  },
  sell_selected_inventory: (ctx) => {
    const selected = ctx.equipmentInventory[ctx.inventorySelectedIndex];
    if (!selected) return;
    const price = Math.floor((selected.value || 0) / 2);
    ctx.player.gold += price;
    ctx.equipmentInventory.splice(ctx.inventorySelectedIndex, 1);
    ctx.inventorySelectedIndex = Math.min(ctx.inventorySelectedIndex, Math.max(0, ctx.equipmentInventory.length - 1));
    addLog(ctx, `Sold ${selected.name} for ${price} gold.`);
    pickupFloorItemAtPlayerPosition(ctx);
  },

  // --- 町の進行施設ロジック ---
  purchase_home: (ctx) => {
    if (ctx.homePurchased || ctx.player.gold < HOME_CONFIG.purchasePrice) return;
    ctx.player.gold -= HOME_CONFIG.purchasePrice;
    ctx.homePurchased = true;
    addLog(ctx, `Purchased a home in town for ${HOME_CONFIG.purchasePrice} gold.`);
  },
  enter_abyss_dungeon: (ctx) => {
    if (!hasClearedBlacksmithMilestone(ctx)) return;
    ctx.currentMapType = 'dungeon';
    ctx.dungeonMode = 'abyss';
    ctx.depth = ABYSS_CONFIG.startDepth;
    addLog(ctx, `You crossed the Abyss Gate. Descent begins at A${ctx.depth}.`);
  },

  // --- 自宅ロジック ---
  prepare_home_menu: (ctx) => {
    ctx.homeStorage = ctx.homeStorage || { equipment: [], gold: 0 };
    rebuildHomeMenuEntries(ctx);
  },
  home_cursor_up: (ctx) => { ctx.homeSelectedIndex = Math.max(0, ctx.homeSelectedIndex - 1); },
  home_cursor_down: (ctx) => { ctx.homeSelectedIndex = Math.min(Math.max(0, ctx.homeMenuEntries.length - 1), ctx.homeSelectedIndex + 1); },
  deposit_home_equipment: (ctx) => {
    const entry = ctx.homeMenuEntries[ctx.homeSelectedIndex];
    if (!entry || entry.kind !== 'carried') return;
    const [item] = ctx.equipmentInventory.splice(entry.index, 1);
    if (!item) return;
    ctx.homeStorage.equipment.push(item);
    addLog(ctx, `Stored ${item.name} at home.`);
    rebuildHomeMenuEntries(ctx);
  },
  withdraw_home_equipment: (ctx) => {
    const entry = ctx.homeMenuEntries[ctx.homeSelectedIndex];
    if (!entry || entry.kind !== 'stored' || ctx.equipmentInventory.length >= ctx.inventoryCapacity) return;
    const [item] = ctx.homeStorage.equipment.splice(entry.index, 1);
    if (!item) return;
    ctx.equipmentInventory.push(item);
    addLog(ctx, `Took ${item.name} from home.`);
    rebuildHomeMenuEntries(ctx);
  },
  deposit_home_gold: (ctx) => {
    const amount = Math.min(10, ctx.player.gold);
    if (amount <= 0) return;
    ctx.player.gold -= amount;
    ctx.homeStorage.gold += amount;
    addLog(ctx, `Deposited ${amount} gold at home.`);
    rebuildHomeMenuEntries(ctx);
  },
  withdraw_home_gold: (ctx) => {
    const amount = Math.min(10, ctx.homeStorage.gold);
    if (amount <= 0) return;
    ctx.homeStorage.gold -= amount;
    ctx.player.gold += amount;
    addLog(ctx, `Withdrew ${amount} gold from home.`);
    rebuildHomeMenuEntries(ctx);
  },

  // --- 闇の鍛冶屋（Forge Shard強化）ロジック ---
  prepare_dark_smith_menu: (ctx) => {
    ctx.darkSmithMenuEntries = darkSmithCandidateEntries(ctx);
    ctx.darkSmithSelectedIndex = Math.min(ctx.darkSmithSelectedIndex, Math.max(0, ctx.darkSmithMenuEntries.length - 1));
  },
  dark_smith_cursor_up: (ctx) => { ctx.darkSmithSelectedIndex = Math.max(0, ctx.darkSmithSelectedIndex - 1); },
  dark_smith_cursor_down: (ctx) => { ctx.darkSmithSelectedIndex = Math.min(Math.max(0, ctx.darkSmithMenuEntries.length - 1), ctx.darkSmithSelectedIndex + 1); },
  prepare_dark_smith_dismantle_menu: (ctx) => {
    ctx.darkSmithDismantleEntries = darkSmithDismantleEntries(ctx);
    ctx.darkSmithDismantleSelectedIndex = Math.min(ctx.darkSmithDismantleSelectedIndex, Math.max(0, ctx.darkSmithDismantleEntries.length - 1));
  },
  dark_smith_dismantle_cursor_up: (ctx) => { ctx.darkSmithDismantleSelectedIndex = Math.max(0, ctx.darkSmithDismantleSelectedIndex - 1); },
  dark_smith_dismantle_cursor_down: (ctx) => { ctx.darkSmithDismantleSelectedIndex = Math.min(Math.max(0, ctx.darkSmithDismantleEntries.length - 1), ctx.darkSmithDismantleSelectedIndex + 1); },
  dismantle_selected_dark_smith_item: (ctx) => {
    const entry = ctx.darkSmithDismantleEntries[ctx.darkSmithDismantleSelectedIndex];
    if (!entry) return;
    const current = ctx.equipmentInventory[entry.index];
    if (current !== entry.item || entry.yield <= 0) return;
    ctx.equipmentInventory.splice(entry.index, 1);
    ctx.forgeShards += entry.yield;
    addLog(ctx, `Dismantled ${entry.item.name} into ${entry.yield} Forge Shard${entry.yield === 1 ? '' : 's'}.`);
    ctx.darkSmithDismantleEntries = darkSmithDismantleEntries(ctx);
    ctx.darkSmithDismantleSelectedIndex = Math.min(ctx.darkSmithDismantleSelectedIndex, Math.max(0, ctx.darkSmithDismantleEntries.length - 1));
    ctx.darkSmithMenuEntries = darkSmithCandidateEntries(ctx);
  },
  attempt_dark_smith_upgrade: (ctx) => {
    const entry = ctx.darkSmithMenuEntries[ctx.darkSmithSelectedIndex];
    const option = entry?.item?.options?.[0];
    const materialCost = darkSmithMaterialCost(option);
    if (!entry || !option || ctx.forgeShards < materialCost) return;
    const rate = darkSmithSuccessRate(option);
    ctx.forgeShards -= materialCost;
    if (Math.random() < rate) {
      strengthenEquipmentOption(entry.item, option);
      addLog(ctx, `${entry.item.name}: ${option.name} strengthened to +${option.value}.`);
    } else {
      addLog(ctx, `${entry.item.name}: forging failed. ${materialCost} Forge Shard${materialCost === 1 ? '' : 's'} consumed; the item was not damaged.`);
    }
    ctx.darkSmithMenuEntries = darkSmithCandidateEntries(ctx);
  },


  // --- 鍛冶屋（1000Gold再抽選）ロジック ---
  prepare_blacksmith_menu: (ctx) => { ctx.blacksmithEntries = blacksmithCandidateEntries(ctx); ctx.blacksmithSelectedIndex = Math.min(ctx.blacksmithSelectedIndex, Math.max(0, ctx.blacksmithEntries.length - 1)); ctx.blacksmithProposal = null; },
  blacksmith_cursor_up: (ctx) => { ctx.blacksmithSelectedIndex = Math.max(0, ctx.blacksmithSelectedIndex - 1); },
  blacksmith_cursor_down: (ctx) => { ctx.blacksmithSelectedIndex = Math.min(Math.max(0, ctx.blacksmithEntries.length - 1), ctx.blacksmithSelectedIndex + 1); },
  prepare_blacksmith_kind: (ctx) => { ctx.blacksmithKindIndex = 0; },
  blacksmith_kind_up: (ctx) => { ctx.blacksmithKindIndex = Math.max(0, ctx.blacksmithKindIndex - 1); },
  blacksmith_kind_down: (ctx) => { ctx.blacksmithKindIndex = Math.min(1, ctx.blacksmithKindIndex + 1); },
  roll_blacksmith_proposal: (ctx) => {
    const entry = ctx.blacksmithEntries[ctx.blacksmithSelectedIndex];
    if (!entry || ctx.player.gold < BLACKSMITH_CONFIG.rerollCost) return;
    ctx.player.gold -= BLACKSMITH_CONFIG.rerollCost;
    ctx.blacksmithProposal = createBlacksmithProposal(entry, ctx.blacksmithKindIndex === 0 ? 'option' : 'rarity');
    addLog(ctx, `The Blacksmith consumed ${BLACKSMITH_CONFIG.rerollCost} gold and revealed a candidate alteration.`);
  },
  accept_blacksmith_proposal: (ctx) => { applyBlacksmithProposal(ctx); addLog(ctx, 'Accepted the Blacksmith alteration.'); ctx.blacksmithProposal = null; ctx.blacksmithEntries = blacksmithCandidateEntries(ctx); },
  reject_blacksmith_proposal: (ctx) => { addLog(ctx, 'Rejected the Blacksmith alteration. The gold was not returned.'); ctx.blacksmithProposal = null; ctx.blacksmithEntries = blacksmithCandidateEntries(ctx); },

  // --- ショップロジック群 ---
  generate_shop_stock: (ctx) => {
    ctx.shopSelectedIndex = 0;
    ctx.shopInventory = createShopInventory(ctx);
  },
  shop_cursor_up:   (ctx) => { ctx.shopSelectedIndex = Math.max(0, ctx.shopSelectedIndex - 1); },
  shop_cursor_down: (ctx) => { ctx.shopSelectedIndex = Math.min(ctx.shopInventory.length - 1, ctx.shopSelectedIndex + 1); },
  execute_buy: (ctx) => {
    const item = ctx.shopInventory[ctx.shopSelectedIndex];
    if (!item || item.stock <= 0) return;
    ctx.player.gold -= item.value;
    if (item.type === "food" || item.type === "potion") {
      ctx.player.hunger = Math.min(BALANCE_CONFIG.fullHunger, ctx.player.hunger + (item.hunger || 0));
      ctx.player.hp = Math.min(ctx.player.maxHp, ctx.player.hp + (item.heal || 0));
      addLog(ctx, `Used ${item.name}.`);
    } else if (item.type === "return_scroll") {
      ctx.player.returnScrolls++;
      addLog(ctx, `Purchased a Return to Town Scroll. Carried: ${ctx.player.returnScrolls}.`);
    } else if (item.type === "full_restore") {
      ctx.player.hp = ctx.player.maxHp;
      ctx.player.hunger = BALANCE_CONFIG.fullHunger;
      addLog(ctx, "Fully restored HP and hunger.");
    } else if (item.type === "weapon") {
      ctx.player.weapon = item;
      addLog(ctx, `Equipped new weapon: ${item.name}!`);
    } else if (item.type === "armor") {
      ctx.player.armor = item;
      addLog(ctx, `Equipped new armor: ${item.name}!`);
    } else if (item.type === "training") {
      ctx.player.exp += item.exp;
      addLog(ctx, `Studied ${item.name}. Gained ${item.exp} EXP.`);
      applyLevelUps(ctx);
    } else if (item.type === "bomb_range") {
      ctx.player.bombRange = Math.min(BOMB_CONFIG.maxRange, ctx.player.bombRange + 1);
      ctx.player.bombRangeShopPurchases++;
      addLog(ctx, `Purchased blast range upgrade ${ctx.player.bombRangeShopPurchases}/3. Range is now ${ctx.player.bombRange}.`);
    } else if (item.type === "bomb_capacity") {
      ctx.player.bombCapacity = Math.min(BOMB_CONFIG.maxCapacity, ctx.player.bombCapacity + 1);
      ctx.player.bombCapacityShopPurchases++;
      addLog(ctx, `Purchased the town's only bomb harness upgrade. Capacity is now ${ctx.player.bombCapacity}.`);
    }
    item.stock--;
    if (item.stock <= 0) item.name = `[ Sold Out ] ${item.name}`;
  },

  // --- 宿屋・酒場ロジック ---
  execute_inn_rest: (ctx) => {
    ctx.player.gold -= 20;
    ctx.player.hp = ctx.player.maxHp;
    ctx.player.hunger = BALANCE_CONFIG.fullHunger;
    ctx.timePhase = 0; // 強制的に安全な「朝」に戻す
    ctx.enemies = []; // 町の夜襲ゾンビを完全消去して安全確保
    addLog(ctx, "You rested well at the Inn. Morning has come.");
  },
  gather_bar_rumor: (ctx) => {
    const nextBoss = Math.max(5, Math.ceil(Math.max(1, ctx.maxReachedDepth + 1) / 5) * 5);
    ctx.barMessage = `"Every fifth floor has a guardian and a cyan return warp. Your deepest record is B${ctx.maxReachedDepth}; the next guardian waits on B${nextBoss}."`;
  }
};

function storeEquipmentLoot(ctx, item) {
  return autoEquipOrStoreEquipment(ctx, item, { x: item.x, y: item.y });
}

function createTreasureRewardRuntime(ctx, reward) {
  const equipment = reward && (reward.type === "weapon" || reward.type === "armor") ? { ...reward } : null;
  const slot = equipment?.type === "weapon" ? "weapon" : "armor";
  return {
    ctx,
    reward,
    equipment,
    slot,
    current: equipment ? ctx.player[slot] : null,
    intent: null,
    trace: []
  };
}

function treasureRewardIsEquipment(runtime) {
  return runtime.equipment?.type === "weapon" || runtime.equipment?.type === "armor";
}

const treasureRewardGuards = {
  always: () => true,
  treasure_reward_is_bomb_range: runtime => runtime.reward?.type === "bomb_range",
  treasure_reward_is_bomb_capacity: runtime => runtime.reward?.type === "bomb_capacity",
  treasure_reward_is_gold: runtime => runtime.reward?.type === "gold",
  treasure_reward_is_consumable: runtime => runtime.reward?.type === "food" || runtime.reward?.type === "potion",
  treasure_reward_is_elixir: runtime => runtime.reward?.type === "elixir",
  treasure_reward_is_equipment: treasureRewardIsEquipment,
  treasure_equipment_replaces_and_sells_current: runtime => treasureRewardIsEquipment(runtime) && isClearlyBetterEquipment(runtime.equipment, runtime.current) && shouldAutoSellEquipment(runtime.current, runtime.equipment),

  treasure_equipment_can_store: runtime => treasureRewardIsEquipment(runtime) && !isClearlyBetterEquipment(runtime.equipment, runtime.current) && !shouldAutoSellEquipment(runtime.equipment, runtime.current) && runtime.ctx.equipmentInventory.length < runtime.ctx.inventoryCapacity,
  treasure_intent_bomb_range: runtime => runtime.intent?.type === "INSTALL_BOMB_RANGE",

const treasureRewardActions = {
  set_treasure_bomb_range_intent: runtime => { runtime.intent = { type: "INSTALL_BOMB_RANGE", reason: "PERMANENT_BOMB_UPGRADE" }; },
  set_treasure_bomb_capacity_intent: runtime => { runtime.intent = { type: "INSTALL_BOMB_CAPACITY", reason: "PERMANENT_BOMB_UPGRADE" }; },
  set_treasure_gold_intent: runtime => { runtime.intent = { type: "ADD_GOLD", reason: "TREASURE_CURRENCY" }; },
  set_treasure_consume_intent: runtime => { runtime.intent = { type: "CONSUME", reason: "IMMEDIATE_USE" }; },
  set_treasure_elixir_intent: runtime => { runtime.intent = { type: "CONSUME_ELIXIR", reason: "PERMANENT_MAX_HP" }; },
  set_treasure_equip_sell_current_intent: runtime => { runtime.intent = { type: "AUTO_EQUIP_SELL_CURRENT", slot: runtime.slot, reason: "CLEARLY_BETTER_REPLACEMENT" }; },
  set_treasure_equip_store_current_intent: runtime => { runtime.intent = { type: "AUTO_EQUIP_STORE_CURRENT", slot: runtime.slot, reason: "CLEARLY_BETTER_PRESERVE_CURRENT" }; },
  set_treasure_auto_sell_intent: runtime => { runtime.intent = { type: "AUTO_SELL", reason: "CLEARLY_WEAKER_NO_PRESERVABLE_OPTION" }; },
  set_treasure_store_intent: runtime => { runtime.intent = { type: "STORE", reason: hasPreservableEquipmentOption(runtime.equipment) ? "PRESERVE_OPTION" : "PLAYER_COMPARISON" }; },
  set_treasure_inventory_full_sell_intent: runtime => { runtime.intent = { type: "INVENTORY_FULL_SELL", reason: isClearlyBetterEquipment(runtime.equipment, runtime.current) ? "CANNOT_REPLACE_PRESERVED_CURRENT" : "NO_FLOOR_POSITION" }; },
  set_treasure_unknown_intent: runtime => { runtime.intent = { type: "UNKNOWN", reason: "UNKNOWN_REWARD_TYPE" }; },
  apply_treasure_bomb_range_intent: runtime => {
    runtime.ctx.player.bombRange = Math.min(BOMB_CONFIG.maxRange, runtime.ctx.player.bombRange + 1);
    addLog(runtime.ctx, `VERY RARE! Blast range increased to ${runtime.ctx.player.bombRange}.`);
  },
  apply_treasure_bomb_capacity_intent: runtime => {
    runtime.ctx.player.bombCapacity = Math.min(BOMB_CONFIG.maxCapacity, runtime.ctx.player.bombCapacity + 1);
    addLog(runtime.ctx, `ULTRA RARE! Bomb capacity increased to ${runtime.ctx.player.bombCapacity}.`);
  },
  apply_treasure_gold_intent: runtime => {
    runtime.ctx.player.gold += runtime.reward.amount;
    addLog(runtime.ctx, `The chest contained ${runtime.reward.amount} gold.`);
  },
  apply_treasure_consume_intent: runtime => {
    runtime.ctx.player.hp = Math.min(runtime.ctx.player.maxHp, runtime.ctx.player.hp + (runtime.reward.heal || 0));
    runtime.ctx.player.hunger = Math.min(BALANCE_CONFIG.fullHunger, runtime.ctx.player.hunger + (runtime.reward.hunger || 0));
    addLog(runtime.ctx, `The chest contained ${runtime.reward.name}. It was used immediately.`);
  },
  apply_treasure_elixir_intent: runtime => {
    runtime.ctx.player.permanentMaxHpBonus = Math.max(0, Number(runtime.ctx.player.permanentMaxHpBonus) || 0) + runtime.reward.maxHp;
    recomputePlayerMaxHp(runtime.ctx);
    runtime.ctx.player.hp = runtime.ctx.player.maxHp;
    addLog(runtime.ctx, `The chest contained ${runtime.reward.name}. Max HP increased by ${runtime.reward.maxHp}.`);
  },
  apply_treasure_equip_sell_current_intent: runtime => {
    runtime.ctx.player[runtime.slot] = runtime.equipment;
    sellEquipmentAutomatically(runtime.ctx, runtime.current, 'replaced by a clearly stronger item');
    addLog(runtime.ctx, `Auto-equipped clearly better ${runtime.equipment.name}.`);
    addLog(runtime.ctx, `The chest contained ${runtime.reward.name}.`);
  },
  apply_treasure_equip_store_current_intent: runtime => {
    runtime.ctx.player[runtime.slot] = runtime.equipment;
    runtime.ctx.equipmentInventory.push(runtime.current);
    runtime.ctx.inventorySelectedIndex = runtime.ctx.equipmentInventory.length - 1;
    addLog(runtime.ctx, `Auto-equipped clearly better ${runtime.equipment.name}. Preserved ${runtime.current.name} for its option value.`);
    addLog(runtime.ctx, `The chest contained ${runtime.reward.name}.`);
  },
  apply_treasure_auto_sell_intent: runtime => {
    sellEquipmentAutomatically(runtime.ctx, runtime.equipment, 'clearly weaker and no Rare option');
    addLog(runtime.ctx, `The chest contained ${runtime.reward.name}.`);
  },
  apply_treasure_store_intent: runtime => {
    runtime.ctx.equipmentInventory.push(runtime.equipment);
    runtime.ctx.inventorySelectedIndex = runtime.ctx.equipmentInventory.length - 1;
    const preservation = hasPreservableEquipmentOption(runtime.equipment) ? ' Rare option preserved for future smithing.' : '';
    addLog(runtime.ctx, `Stored ${runtime.equipment.name}.${preservation} Open Equipment with [I].`);
    addLog(runtime.ctx, `The chest contained ${runtime.reward.name}.`);
  },
  apply_treasure_inventory_full_sell_intent: runtime => {
    const price = Math.floor((runtime.reward.value || 0) / 2);
    runtime.ctx.player.gold += price;
    addLog(runtime.ctx, `The chest contained ${runtime.reward.name}; inventory was full, so it was sold for ${price} gold.`);
  },
  apply_treasure_unknown_intent: () => {}
};

function executeTreasureRewardDispositionSfa(ctx, reward) {
  const runtime = createTreasureRewardRuntime(ctx, reward);
  const result = runLocalSfa(TREASURE_REWARD_DISPOSITION_SFA, "TREASURE_REWARD_REQUESTED", "CLASSIFY", runtime, treasureRewardGuards, treasureRewardActions);
  runtime.trace = result.trace;
  ctx.lastTreasureRewardDecision = {
    rewardName: reward?.name || null,
    rewardType: reward?.type || null,
    intent: runtime.intent ? { ...runtime.intent } : null,
    trace: result.trace
  };
  return runtime;
}

function createFloorLootRuntime(ctx, itemIndex) {
  const item = ctx.items[itemIndex] || null;
  const equipment = item ? (() => { const { x, y, ...rest } = item; return rest; })() : null;
  const slot = equipment?.type === "weapon" ? "weapon" : "armor";
  return {
    ctx,
    itemIndex,
    item,
    originalItemName: item?.name || null,
    originalItemType: item?.type || null,
    equipment,
    slot,
    current: equipment && (equipment.type === "weapon" || equipment.type === "armor") ? ctx.player[slot] : null,
    intent: null,
    removeFloor: false,
    trace: []
  };
}

function floorLootIsEquipment(runtime) {
  return runtime.equipment?.type === "weapon" || runtime.equipment?.type === "armor";
}

const floorLootGuards = {
  always: () => true,
  floor_loot_is_consumable: runtime => runtime.item?.type === "potion" || runtime.item?.type === "food",

  floor_equipment_replaces_and_leaves_current: runtime => floorLootIsEquipment(runtime) && isClearlyBetterEquipment(runtime.equipment, runtime.current) && !shouldAutoSellEquipment(runtime.current, runtime.equipment) && runtime.ctx.equipmentInventory.length >= runtime.ctx.inventoryCapacity,
  floor_equipment_should_auto_sell: runtime => floorLootIsEquipment(runtime) && shouldAutoSellEquipment(runtime.equipment, runtime.current),
  floor_equipment_can_store: runtime => floorLootIsEquipment(runtime) && runtime.ctx.equipmentInventory.length < runtime.ctx.inventoryCapacity,
  floor_loot_intent_consumes: runtime => runtime.intent?.type === "CONSUME",
  floor_loot_intent_elixir: runtime => runtime.intent?.type === "CONSUME_ELIXIR",
  floor_loot_intent_chest: runtime => runtime.intent?.type === "OPEN_CHEST",
  floor_loot_intent_bomb_range: runtime => runtime.intent?.type === "INSTALL_BOMB_RANGE",
  floor_loot_intent_bomb_capacity: runtime => runtime.intent?.type === "INSTALL_BOMB_CAPACITY",
  floor_loot_intent_equip_sell: runtime => runtime.intent?.type === "AUTO_EQUIP_SELL_CURRENT",
  floor_loot_intent_equip_store: runtime => runtime.intent?.type === "AUTO_EQUIP_STORE_CURRENT",
  floor_loot_intent_equip_swap_floor: runtime => runtime.intent?.type === "AUTO_EQUIP_LEAVE_CURRENT",
  floor_loot_intent_auto_sell: runtime => runtime.intent?.type === "AUTO_SELL",
  floor_loot_intent_store: runtime => runtime.intent?.type === "STORE",
  floor_loot_intent_leave: runtime => runtime.intent?.type === "LEAVE_ON_FLOOR",
  floor_loot_intent_unknown: runtime => runtime.intent?.type === "UNKNOWN"
};

const floorLootActions = {
  set_floor_loot_consume_intent: runtime => { runtime.intent = { type: "CONSUME", itemType: runtime.item.type, reason: "IMMEDIATE_USE" }; },
  set_floor_loot_elixir_intent: runtime => { runtime.intent = { type: "CONSUME_ELIXIR", reason: "PERMANENT_MAX_HP" }; },
  set_floor_loot_chest_intent: runtime => { runtime.intent = { type: "OPEN_CHEST", reason: "TREASURE_CONTAINER" }; },
  set_floor_loot_bomb_range_intent: runtime => { runtime.intent = { type: "INSTALL_BOMB_RANGE", reason: "PERMANENT_BOMB_UPGRADE" }; },
  set_floor_loot_bomb_capacity_intent: runtime => { runtime.intent = { type: "INSTALL_BOMB_CAPACITY", reason: "PERMANENT_BOMB_UPGRADE" }; },

  set_floor_loot_equip_store_intent: runtime => { runtime.intent = { type: "AUTO_EQUIP_STORE_CURRENT", slot: runtime.slot, reason: "CLEARLY_BETTER_PRESERVE_CURRENT" }; },

  set_floor_loot_auto_sell_intent: runtime => { runtime.intent = { type: "AUTO_SELL", reason: "CLEARLY_WEAKER_NO_PRESERVABLE_OPTION" }; },

  set_floor_loot_leave_intent: runtime => { runtime.intent = { type: "LEAVE_ON_FLOOR", reason: hasPreservableEquipmentOption(runtime.equipment) ? "INVENTORY_FULL_PRESERVE_OPTION" : "INVENTORY_FULL_PLAYER_COMPARISON" }; },
  set_floor_loot_unknown_intent: runtime => { runtime.intent = { type: "UNKNOWN", reason: "UNKNOWN_ITEM_TYPE" }; },
  apply_floor_loot_consume_intent: runtime => {
    runtime.ctx.player.hp = Math.min(runtime.ctx.player.maxHp, runtime.ctx.player.hp + (runtime.item.heal || 20));
    runtime.ctx.player.hunger = Math.min(BALANCE_CONFIG.fullHunger, runtime.ctx.player.hunger + (runtime.item.hunger || 30));
    addLog(runtime.ctx, `Consumed ${runtime.item.name}. Recovered HP/Hunger.`);
    runtime.removeFloor = true;
  },
  apply_floor_loot_elixir_intent: runtime => {
    runtime.ctx.player.permanentMaxHpBonus = Math.max(0, Number(runtime.ctx.player.permanentMaxHpBonus) || 0) + runtime.item.maxHp;
    recomputePlayerMaxHp(runtime.ctx);
    runtime.ctx.player.hp = runtime.ctx.player.maxHp;
    addLog(runtime.ctx, `Consumed ${runtime.item.name}. Max HP increased by ${runtime.item.maxHp}.`);
    runtime.removeFloor = true;
  },
  apply_floor_loot_chest_intent: runtime => {
    addLog(runtime.ctx, "You opened an Ancient Treasure Chest.");
    applyTreasureReward(runtime.ctx, runtime.item.reward);
    runtime.removeFloor = true;
  },
  apply_floor_loot_bomb_range_intent: runtime => {
    runtime.ctx.player.bombRange = Math.min(BOMB_CONFIG.maxRange, runtime.ctx.player.bombRange + 1);
    addLog(runtime.ctx, `Blast Radius Crystal installed. Range is now ${runtime.ctx.player.bombRange}.`);
    runtime.removeFloor = true;
  },
  apply_floor_loot_bomb_capacity_intent: runtime => {
    runtime.ctx.player.bombCapacity = Math.min(BOMB_CONFIG.maxCapacity, runtime.ctx.player.bombCapacity + 1);
    addLog(runtime.ctx, `Infinite Chamber Core installed. Capacity is now ${runtime.ctx.player.bombCapacity}.`);
    runtime.removeFloor = true;
  },
  apply_floor_loot_equip_sell_intent: runtime => {
    runtime.ctx.player[runtime.slot] = runtime.equipment;

    runtime.removeFloor = true;
  },
  apply_floor_loot_equip_store_intent: runtime => {
    runtime.ctx.player[runtime.slot] = runtime.equipment;
    runtime.ctx.equipmentInventory.push(runtime.current);
    runtime.ctx.inventorySelectedIndex = runtime.ctx.equipmentInventory.length - 1;
    addLog(runtime.ctx, `Auto-equipped clearly better ${runtime.equipment.name}. Preserved ${runtime.current.name} for its option value.`);
    runtime.removeFloor = true;
  },
  apply_floor_loot_equip_swap_floor_intent: runtime => {
    runtime.ctx.player[runtime.slot] = runtime.equipment;
    Object.assign(runtime.item, runtime.current, { x: runtime.item.x, y: runtime.item.y });
    addLog(runtime.ctx, `Auto-equipped clearly better ${runtime.equipment.name}. ${runtime.current.name} remains on the floor.`);
    runtime.removeFloor = false;
  },
  apply_floor_loot_auto_sell_intent: runtime => {
    sellEquipmentAutomatically(runtime.ctx, runtime.equipment, 'clearly weaker and no Rare option');
    runtime.removeFloor = true;

  apply_floor_loot_store_intent: runtime => {
    runtime.ctx.equipmentInventory.push(runtime.equipment);
    runtime.ctx.inventorySelectedIndex = runtime.ctx.equipmentInventory.length - 1;
    const preservation = hasPreservableEquipmentOption(runtime.equipment) ? ' Rare option preserved for future smithing.' : '';
    addLog(runtime.ctx, `Stored ${runtime.equipment.name}.${preservation} Open Equipment with [I].`);
    runtime.removeFloor = true;
  },
  apply_floor_loot_leave_intent: runtime => {
    const reason = hasPreservableEquipmentOption(runtime.equipment) ? 'Rare option preserved' : 'player comparison required';
    addLog(runtime.ctx, `Equipment inventory is full. ${runtime.equipment.name} remains on the floor (${reason}).`);
    runtime.removeFloor = false;
  },
  apply_floor_loot_unknown_intent: runtime => { runtime.removeFloor = false; }
};

function executeFloorLootDispositionSfa(ctx, itemIndex) {
  const runtime = createFloorLootRuntime(ctx, itemIndex);
  if (!runtime.item) return runtime;
  const result = runLocalSfa(FLOOR_LOOT_DISPOSITION_SFA, "FLOOR_LOOT_REQUESTED", "CLASSIFY", runtime, floorLootGuards, floorLootActions);
  runtime.trace = result.trace;
  ctx.lastFloorLootDecision = {
    itemName: runtime.originalItemName,
    itemType: runtime.originalItemType,
    intent: runtime.intent ? { ...runtime.intent } : null,
    removeFloor: runtime.removeFloor,
    trace: result.trace
  };
  if (runtime.removeFloor) ctx.items.splice(itemIndex, 1);
  return runtime;
}

    dx,
    dy,
    targetX: ctx.player.x + dx,
    targetY: ctx.player.y + dy,
    targetEnemy: null,
    intent: null,
    trace: []
  };
}

function playerTargetGridCell(runtime) {
  const row = runtime.ctx.grid[runtime.targetY];
  return row ? row[runtime.targetX] : 2;
}

const playerActionGuards = {
  always: () => true,
  player_target_is_terrain_blocked: runtime => playerTargetGridCell(runtime) !== 0,
  player_target_has_bomb: runtime => isBombAt(runtime.ctx, runtime.targetX, runtime.targetY),
  player_target_has_enemy: runtime => runtime.ctx.enemies.some(enemy => enemy.x === runtime.targetX && enemy.y === runtime.targetY),
  player_target_has_loot: runtime => runtime.ctx.items.some(item => item.x === runtime.targetX && item.y === runtime.targetY),
  player_intent_is_terrain_blocked: runtime => runtime.intent?.type === "BLOCKED_TERRAIN",
  player_intent_is_bomb_blocked: runtime => runtime.intent?.type === "BLOCKED_BOMB",
  player_intent_is_attack: runtime => runtime.intent?.type === "ATTACK",
  player_intent_is_move_pickup: runtime => runtime.intent?.type === "MOVE_AND_PICKUP",
  player_intent_is_move: runtime => runtime.intent?.type === "MOVE"
};

const playerActionActions = {
  set_player_terrain_blocked_intent: runtime => {
    const cell = playerTargetGridCell(runtime);
    runtime.intent = { type: "BLOCKED_TERRAIN", to: { x: runtime.targetX, y: runtime.targetY }, reason: cell === 1 ? "DESTRUCTIBLE_ROCK" : "INDESTRUCTIBLE_WALL" };
  },
  set_player_bomb_blocked_intent: runtime => {
    runtime.intent = { type: "BLOCKED_BOMB", to: { x: runtime.targetX, y: runtime.targetY }, reason: "ARMED_BOMB" };
  },
  set_player_attack_intent: runtime => {
    runtime.targetEnemy = runtime.ctx.enemies.find(enemy => enemy.x === runtime.targetX && enemy.y === runtime.targetY) || null;
    runtime.intent = { type: "ATTACK", to: { x: runtime.targetX, y: runtime.targetY }, targetEnemyId: runtime.targetEnemy?.id ?? null, reason: "ENEMY_CONTACT" };
  },
  set_player_move_pickup_intent: runtime => {
    runtime.intent = { type: "MOVE_AND_PICKUP", to: { x: runtime.targetX, y: runtime.targetY }, reason: "FLOOR_LOOT" };
  },
  set_player_move_intent: runtime => {
    runtime.intent = { type: "MOVE", to: { x: runtime.targetX, y: runtime.targetY }, reason: "OPEN_FLOOR" };
  },
  apply_player_terrain_blocked_intent: runtime => {
    addLog(runtime.ctx, runtime.intent.reason === "DESTRUCTIBLE_ROCK" ? "A destructible rock blocks the way." : "An indestructible wall blocks the way.");
  },
  apply_player_bomb_blocked_intent: runtime => {
    addLog(runtime.ctx, "The armed bomb blocks that tile.");
  },
  apply_player_attack_intent: runtime => {
    const target = runtime.targetEnemy || runtime.ctx.enemies.find(enemy => enemy.x === runtime.targetX && enemy.y === runtime.targetY);
    if (!target) return;
    const playerAtk = playerAttackPower(runtime.ctx);
    target.provoked = true;
    target.hasDetectedPlayer = true;
    target.hp -= playerAtk;
    addLog(runtime.ctx, `You slash ${target.name} for ${playerAtk} damage!`);
    if (target.hp <= 0) defeatEnemy(runtime.ctx, target, 'your blade');
  },
  apply_player_move_pickup_intent: runtime => {
    runtime.ctx.player.x = runtime.targetX;
    runtime.ctx.player.y = runtime.targetY;
    pickupFloorItemAtPlayerPosition(runtime.ctx);
  },
  apply_player_move_intent: runtime => {
    runtime.ctx.player.x = runtime.targetX;
    runtime.ctx.player.y = runtime.targetY;
  }
};

function executePlayerActionSfa(ctx, dx, dy) {
  const runtime = createPlayerActionRuntime(ctx, dx, dy);
  const result = runLocalSfa(PLAYER_ACTION_SFA, "PLAYER_ACTION_REQUESTED", "CLASSIFY", runtime, playerActionGuards, playerActionActions);
  runtime.trace = result.trace;
  ctx.lastPlayerActionDecision = {
    direction: { dx, dy },
    intent: runtime.intent ? { ...runtime.intent, to: runtime.intent.to ? { ...runtime.intent.to } : undefined } : null,
    trace: result.trace
  };
  return runtime;
}

function resolvePlayerMovement(ctx, dx, dy) {
  return executePlayerActionSfa(ctx, dx, dy);
}

function pickupFloorItemAtPlayerPosition(ctx) {
  const itemIndex = ctx.items.findIndex(item => item.x === ctx.player.x && item.y === ctx.player.y);
  if (itemIndex === -1) return false;
  return executeFloorLootDispositionSfa(ctx, itemIndex).removeFloor;
}

function applySfaStateMetadata(definitions, descriptions, defaultRole) {
  for (const [stateId, definition] of Object.entries(definitions)) {
    const description = descriptions[stateId];
    if (!description) throw new Error(`Missing SFA description: ${stateId}`);
    definition.state_id = stateId;
    definition.role = definition.role || defaultRole;
    definition.description = description;
  }
  const unknownDescriptions = Object.keys(descriptions).filter(stateId => !definitions[stateId]);
  if (unknownDescriptions.length) throw new Error(`Unknown SFA descriptions: ${unknownDescriptions.join(", ")}`);
}

// ==========================================
// 6. SFA ステートマシンエンジン
// ==========================================
class SFAEngine {
  constructor(definitions, initialState, context, guards, actions, onTransitioned) {
    this.definitions = definitions;
    this.currentState = initialState;
    this.context = context;
    this.guards = guards;
    this.actions = actions;
    this.onTransitioned = onTransitioned;
    this.onTransitioned(this.currentState, this.context);
  }

  async transition(event) {
    const stateDef = this.definitions[this.currentState];
    if (!stateDef.next_transitions) return;

    const matchedTransitions = stateDef.next_transitions.filter(t => t.event === event);

    for (const trans of matchedTransitions) {
      const isAllowed = !trans.guard || this.guards[trans.guard](this.context);

      if (isAllowed) {
        if (stateDef.on_exit) this.actions[stateDef.on_exit](this.context);
        if (trans.action) this.actions[trans.action](this.context);

        this.currentState = trans.target_state;
        const nextStateDef = this.definitions[this.currentState];

        if (nextStateDef.on_enter) this.actions[nextStateDef.on_enter](this.context);

        this.onTransitioned(this.currentState, this.context);

        await this.handleAutoTransition();
        return true;
      }
    }
    return false;
  }

  async handleAutoTransition() {
    const stateDef = this.definitions[this.currentState];
    if (!stateDef.next_transitions) return;

    const autoTransitions = stateDef.next_transitions.filter(t => t.event === "AUTO");

    for (const trans of autoTransitions) {
      const isAllowed = !trans.guard || this.guards[trans.guard](this.context);

      if (isAllowed) {
        if (stateDef.on_exit) this.actions[stateDef.on_exit](this.context);
        if (trans.action) this.actions[trans.action](this.context);

        this.currentState = trans.target_state;
        const nextStateDef = this.definitions[this.currentState];

        if (nextStateDef.on_enter) this.actions[nextStateDef.on_enter](this.context);

        this.onTransitioned(this.currentState, this.context);

        await this.handleAutoTransition();
        return;
      }
    }
  }
}

function getHpPresentation(player) {
  const ratio = player.maxHp > 0 ? player.hp / player.maxHp : 0;
  const poisonActive = (player.statusEffects?.poisonTurns || 0) > 0 || player.hpFlow === "poisoned";
  let className;
  if (poisonActive) className = "hp-poisoned";
  else if (player.hpFlow === "starving") className = "hp-starving";
  else if (ratio <= 0.25) className = "hp-critical";
  else if (ratio <= 0.50) className = "hp-wounded";
  else if (ratio <= 0.75) className = "hp-light";
  else className = "hp-vital";

  let marker = "";
  let markerClass = "";
  if (player.hpFlow === "recovering") { marker = "+"; markerClass = "hp-flow-positive"; }
  else if (["starving", "poisoned"].includes(player.hpFlow)) { marker = "-"; markerClass = "hp-flow-negative"; }
  return { className, marker, markerClass };
}

function render(state, ctxGame) {
  const gameStatusInformation = document.getElementById("game-status-information");
  if (gameStatusInformation) gameStatusInformation.style.display = state === "FE_TITLE" ? "none" : "block";

  // 時間帯に応じてブラウザ全体の背景色(グラデーション)を変え、夜の深さを情緒的に演出

  let boardHtml = "";
  const isTown = ctxGame.currentMapType === "town";
  const playerHpPresentation = getHpPresentation(ctxGame.player);

  for (let r = 0; r < 15; r++) {
    for (let c = 0; c < 15; c++) {
      // 1. ベースマスの決定
      let symbol = ctxGame.grid[r][c] === 2 ? "＃" : (ctxGame.grid[r][c] === 1 ? "＃" : "・");

      // 特別な環境施設の配置・マッピング
      const tileKey = `${c},${r}`;
      if (ctxGame.tiles[tileKey] === "inn")     { symbol = "Ｈ"; className = "tile-inn"; }
      if (ctxGame.tiles[tileKey] === "shop")    { symbol = "Ｓ"; className = "tile-shop"; }
      if (ctxGame.tiles[tileKey] === "bar")     { symbol = "Ｂ"; className = "tile-bar"; }
      if (ctxGame.tiles[tileKey] === "home")          { symbol = "Ｍ"; className = "tile-home"; }
      if (ctxGame.tiles[tileKey] === "home_for_sale") { symbol = "＄"; className = "tile-home-sale"; }
      if (ctxGame.tiles[tileKey] === "smith")         { symbol = "Ｆ"; className = "tile-smith"; }
      if (ctxGame.tiles[tileKey] === "smith_closed")  { symbol = "ｆ"; className = "tile-smith-closed"; }
      if (ctxGame.tiles[tileKey] === "abyss_gate")    { symbol = "Ω"; className = "tile-abyss"; }
      if (ctxGame.tiles[tileKey] === "stairs")    { symbol = "＞"; className = "tile-stairs"; }
      if (ctxGame.tiles[tileKey] === "town_warp") { symbol = "◎"; className = "tile-warp"; }
      if (ctxGame.tiles[tileKey] === "dark_smith") { symbol = "☾"; className = "tile-smith"; }

      // 2. 動的エンティティの上書き配置（ペインターレイヤー法）
      const warning = ctxGame.enemies.some(enemy => enemy.pendingSpell && warningCellsForSpell(enemy.pendingSpell).some(cell => cell.x === c && cell.y === r));
      if (warning) { symbol = "！"; className = "magic-warning"; }

      const item = ctxGame.items.find(i => i.x === c && i.y === r);
      if (item) {
         symbol = item.type === "chest" ? "Ｔ" : (item.type === "food" ? "Ｆ" : (item.type === "potion" ? "Ｐ" : (item.type === "elixir" ? "Ｅ" : ((item.type === "bomb_capacity" || item.type === "bomb_range") ? "Ｃ" : (item.type === "weapon" ? "Ｗ" : "Ａ")))));
         className = `item rarity-${(item.rarity || 'common').replace('_', '-')}`;
      }

      const bomb = ctxGame.bombs.find(b => b.x === c && b.y === r);
      if (bomb) { symbol = String(Math.max(1, bomb.fuse)); className = bomb.source === "mirror" ? "mirror-bomb" : "bomb"; }

      if (ctxGame.explosionCells.includes(tileKey)) { symbol = "※"; className = "explosion"; }

      const enemy = ctxGame.enemies.find(e => e.x === c && e.y === r);
      if (enemy) {
         symbol = enemy.symbol || (enemy.isBoss ? "👹" : "Ｅ");
         const rarityClass = `rarity-${(enemy.rarity || 'common').replace('_', '-')}`;
         const threatBand = enemyThreatBand(ctxGame, enemy);
         const threatClass = threatBand === 'neutral' ? 'food-neutral' : `threat-${threatBand}`;
         className = `${enemy.isBoss ? 'boss' : 'enemy'} ${rarityClass} ${threatClass}`;
      }

      if (ctxGame.player.x === c && ctxGame.player.y === r) {
        symbol = "＠"; className = `player ${playerHpPresentation.className}`;
      }

      boardHtml += `<span class="${className}">${symbol}</span>`;
    }
  }

  // HUD文字列の更新

  document.getElementById("timephase").textContent = `TIME: ${TIME_NAMES[ctxGame.timePhase]} (Turn ${ctxGame.turnCount})`;

  document.getElementById("gold").textContent = `GOLD: ${ctxGame.player.gold}g BOMB:∞ SET:${playerBombs(ctxGame).length}/${ctxGame.player.bombCapacity} RNG:${ctxGame.player.bombRange} SCR:${ctxGame.player.returnScrolls}`;
  document.getElementById("player-lvl").textContent = `LV: ${ctxGame.player.level} (${ctxGame.player.exp}/${ctxGame.player.nextExp})`;

  // ログウィンドウの更新
  document.getElementById("log-window").innerHTML = ctxGame.logs
    .map((log, idx) => `<div class="${idx === ctxGame.logs.length - 1 ? 'new-log' : ''}">> ${log}</div>`)

  // 3. メニューオーバレイ制御（projection policyに従って画面を完全ロック）
  const overlay = document.getElementById("overlay");

  } else if (overlayMode === "abyss-entry") {
    overlay.style.display = "flex";

  } else if (overlayMode === "inventory") {

      comparison = `${selected.type.toUpperCase()}: ${coloredEquipmentName(current)} ${current[key]} → ${coloredEquipmentName(selected)} ${selected[key]} <span class="${diffClass}">(${diff >= 0 ? '+' : ''}${diff})</span><br>Current option: ${equipmentOptionSummary(current)}<br>Candidate option: ${equipmentOptionSummary(selected)}`;
