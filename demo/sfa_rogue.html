<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SFA Rogue - Hack & Slash Edition</title>
    <!-- Import Japanese monospace font officially hosted by Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0d0d13;
            color: #ced4da;
            font-family: 'M PLUS 1 Code', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-color 0.8s ease; /* 時間変化の背景色グラデーション用 */
        }
        #game-container {
            position: relative;
            border: 4px solid #3b3b4f;
            padding: 12px;
            background-color: #050508;
            box-shadow: 0 0 25px rgba(0,0,0,0.8);
        }
        /* Lock 1 character per cell using CSS Grid (15x15 Map) */
        #board {
            display: grid;
            grid-template-columns: repeat(15, 24px);
            grid-template-rows: repeat(15, 24px);
            gap: 0;
            width: 360px;
            height: 360px;
            margin: 0;
            font-size: 20px;
            line-height: 24px;
            text-align: center;
        }
        #board span {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
        }
        /* Character specific styling for authentic terminal look */
        .wall { color: #454851; }
        .rock { color: #70747f; font-weight: bold; }
        .floor { color: #2e2e3e; }
        .town-floor { color: #3b4f3b; }
        .player { font-weight: bold; text-shadow: 0 0 8px currentColor; }
        .enemy, .boss { font-weight: bold; }
        .boss { text-shadow: 0 0 10px currentColor; }
        .item { color: #33ff33; font-weight: bold; }
        .rarity-rare { color: #55aaff; text-shadow: 0 0 5px #3388ff; }
        .rarity-very-rare { color: #d46bff; text-shadow: 0 0 7px #b000ff; }
        .rarity-ultra-rare { color: #ffd84d; text-shadow: 0 0 9px #ff9900; }
        /* Threat color overrides rarity color; rarity remains visible through its glow. */
        .threat-safe { color: #69e38f; }
        .threat-even { color: #f0dc68; }
        .threat-dangerous { color: #ff974d; }
        .threat-deadly { color: #ff4055; }
        .food-neutral { color: #e8edf2; text-shadow: 0 0 4px #ffffff55; }
        .tile-inn { color: #ff9933; font-weight: bold; }
        .tile-shop { color: #3399ff; font-weight: bold; }
        .tile-bar { color: #cc66ff; font-weight: bold; }
        .tile-home { color: #66e3a4; font-weight: bold; }
        .tile-home-sale { color: #9aa7b5; font-weight: bold; }
        .tile-smith { color: #ffcc66; font-weight: bold; text-shadow: 0 0 6px #ff8800; }
        .tile-smith-closed { color: #6f6655; font-weight: bold; }
        .tile-abyss { color: #ff66cc; font-weight: bold; text-shadow: 0 0 8px #cc00ff; }
        .tile-stairs { color: #ffffff; font-weight: bold; text-decoration: underline; }
        .tile-warp { color: #00ffff; font-weight: bold; text-shadow: 0 0 8px #00ffff; }
        .bomb { color: #ff9f1c; font-weight: bold; text-shadow: 0 0 8px #ff6b00; }
        .mirror-bomb { color: #ff66ff; font-weight: bold; text-shadow: 0 0 8px #ff00ff; }
        .explosion { color: #fff200; font-weight: bold; text-shadow: 0 0 10px #ff3300; }
        .magic-warning { color: #ff66ff; font-weight: bold; text-shadow: 0 0 8px #ff00ff; }

        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5,5,8,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        #hud-top {
            width: 360px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #ff00ff;
            margin-bottom: 4px;
        }
        #hud {
            width: 360px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #00ffcc;
            border-bottom: 1px solid #3b3b4f;
            padding-bottom: 6px;
        }
        #hp { font-weight: bold; transition: color 0.15s ease; }
        .hp-vital { color: #66e3a4; }
        .hp-light { color: #d7e86a; }
        .hp-wounded { color: #ffad5c; }
        .hp-critical { color: #ff4d5a; text-shadow: 0 0 5px rgba(255,77,90,0.35); }
        .hp-starving { color: #ffb347; }
        .hp-poisoned { color: #cc66ff; text-shadow: 0 0 5px rgba(204,102,255,0.35); }
        .hp-flow { margin-left: 3px; font-weight: bold; }
        .hp-flow-positive { color: #39e67d; }
        .hp-flow-negative { color: #ff4545; }
        #log-window {
            margin-top: 8px;
            width: 360px;
            height: 72px;
            font-size: 11px;
            color: #a5a5b5;
            line-height: 1.4;
            overflow: hidden;
        }
        .new-log { color: #ffffff; }

        /* Menu internal styles */
        .menu-title { color: #00ffcc; font-size: 18px; margin-bottom: 15px; font-weight: bold; }
        .menu-item { font-size: 13px; margin: 6px 0; width: 100%; text-align: left; padding-left: 40px; box-sizing: border-box;}
        .selected { color: #ffff00; font-weight: bold; }
        .selected::before { content: "> "; }
        .inventory-panel { width: 100%; text-align: left; font-size: 11px; line-height: 1.45; }
        .inventory-equipped { border-bottom: 1px solid #3b3b4f; padding-bottom: 8px; margin-bottom: 8px; }
        .inventory-list { max-height: 180px; overflow-y: auto; overflow-x: hidden; scrollbar-gutter: stable; padding-right: 4px; }
        .inventory-item { padding: 2px 6px; white-space: nowrap; }
        .inventory-comparison { color: #aabbee; margin-top: 8px; min-height: 32px; }
        .inventory-positive { color: #66e3a4; }
        .inventory-negative { color: #ff7777; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="board"></div>
        <div id="overlay"></div>
    </div>

    <div id="game-information">
        <div id="game-status-information">
            <div id="hud-top">
                <span id="location">LOCATION: Town</span>
                <span id="timephase">TIME: Morning</span>
            </div>
            <div id="hud">
                <span id="hp"></span>
                <span id="gold"></span>
                <span id="player-lvl"></span>
            </div>
            <div id="log-window"></div>
        </div>
        <p id="game-controls" style="font-size: 11px; color: #666; text-align: center; margin-top: 10px;">
            [Enter]: Select / Action | [Esc]: Title / Exit Menu <br>
            [←/→/↑/↓]: Move & Attack | [Space]: Place Bomb | [R]: Return Scroll | [.]: Pass 1 Turn | [I]: Equipment
        </p>
    </div>

<script>
// ==========================================
// 1. SFA 状態遷移定義 (SFA-SSOT: 信頼できる唯一の情報源)
// ==========================================
const SFA_DEFINITIONS = {
  FE_TITLE: {
    role: "frontend",
    next_transitions: [
      { event: "START", action: "init_game_data", target_state: "FE_GENERATE_MAP" }
    ]
  },
  FE_GENERATE_MAP: {
    role: "frontend",
    on_enter: "execute_map_generation",
    next_transitions: [
      { event: "AUTO", target_state: "FE_PLAYER_TURN" }
    ]
  },
  FE_PLAYER_TURN: {
    role: "frontend",
    next_transitions: [
      { event: "ESCAPE", target_state: "FE_TITLE" },
      { event: "MOVE_UP",    action: "player_move_up",    target_state: "FE_RESOLVE_PLAYER" },
      { event: "MOVE_DOWN",  action: "player_move_down",  target_state: "FE_RESOLVE_PLAYER" },
      { event: "MOVE_LEFT",  action: "player_move_left",  target_state: "FE_RESOLVE_PLAYER" },
      { event: "MOVE_RIGHT", action: "player_move_right", target_state: "FE_RESOLVE_PLAYER" },
      { event: "PASS",       action: "player_pass_turn",  target_state: "FE_RESOLVE_PLAYER" },
      { event: "PLACE_BOMB", guard: "can_place_bomb", action: "place_bomb", target_state: "FE_RESOLVE_PLAYER" },
      { event: "OPEN_INVENTORY", action: "prepare_inventory_menu", target_state: "FE_INVENTORY_MENU" },
      { event: "USE_RETURN_SCROLL", guard: "can_use_return_scroll", action: "use_return_scroll", target_state: "FE_GENERATE_MAP" },

      // 環境要素へのインタラクション遷移（特定のタイルの上でのみ発火可能）
      { event: "INTERACT", guard: "has_discovered_warps_at_town_stairs", action: "prepare_warp_menu", target_state: "FE_WARP_MENU" },
      { event: "INTERACT", guard: "can_use_stairs",   action: "trigger_stairs",    target_state: "FE_GENERATE_MAP" },
      { event: "INTERACT", guard: "is_on_town_warp", action: "trigger_town_warp", target_state: "FE_GENERATE_MAP" },
      { event: "INTERACT", guard: "is_on_shop_tile", action: "generate_shop_stock", target_state: "FE_SHOP_MENU" },
      { event: "INTERACT", guard: "is_on_inn_tile",  target_state: "FE_INN_MENU" },
      { event: "INTERACT", guard: "is_on_bar_tile",  action: "gather_bar_rumor",  target_state: "FE_BAR_MENU" },
      { event: "INTERACT", guard: "is_on_unpurchased_home_tile", target_state: "FE_HOME_PURCHASE_MENU" },
      { event: "INTERACT", guard: "is_on_home_tile", action: "prepare_home_menu", target_state: "FE_HOME_MENU" },
      { event: "INTERACT", guard: "is_on_closed_smith_tile", target_state: "FE_BLACKSMITH_LOCKED_MENU" },
      { event: "INTERACT", guard: "is_on_smith_tile", action: "prepare_blacksmith_menu", target_state: "FE_BLACKSMITH_MENU" },
      { event: "INTERACT", guard: "is_on_dark_smith_tile", action: "prepare_dark_smith_menu", target_state: "FE_DARK_SMITH_MENU" },
      { event: "INTERACT", guard: "is_on_abyss_gate", target_state: "FE_ABYSS_ENTRY_MENU" }
    ]
  },
  FE_RESOLVE_PLAYER: {
    role: "frontend",
    next_transitions: [
      { event: "AUTO", target_state: "FE_ENEMY_TURN" }
    ]
  },
  FE_ENEMY_TURN: {
    role: "frontend",
    next_transitions: [
      { event: "AUTO", guard: "should_enemies_act", action: "execute_enemy_ai", target_state: "FE_TURN_END" },
      { event: "AUTO", guard: "should_enemies_sleep", target_state: "FE_TURN_END" }
    ]
  },
  FE_TURN_END: {
    role: "frontend",
    next_transitions: [
      { event: "AUTO", guard: "is_player_dead", target_state: "FE_DEATH_RESOLVE" },
      { event: "AUTO", guard: "is_player_alive", target_state: "FE_PROCESS_TURN_LIFECYCLE" }
    ]
  },
  FE_PROCESS_TURN_LIFECYCLE: {
    role: "shared",
    on_enter: "process_turn_lifecycle",
    next_transitions: [
      { event: "AUTO", target_state: "FE_CHECK_TURN_OUTCOME" }
    ]
  },
  FE_CHECK_TURN_OUTCOME: {
    role: "shared",
    next_transitions: [
      { event: "AUTO", guard: "is_player_dead", target_state: "FE_DEATH_RESOLVE" },
      { event: "AUTO", guard: "is_player_won", target_state: "FE_VICTORY" },
      { event: "AUTO", guard: "is_player_alive", target_state: "FE_PLAYER_TURN" }
    ]
  },
  FE_DEATH_RESOLVE: {
    role: "shared",
    on_enter: "apply_death_penalty",
    next_transitions: [
      { event: "AUTO", target_state: "FE_DEATH_SUMMARY" }
    ]
  },
  FE_INVENTORY_MENU: {
    role: "frontend",
    next_transitions: [
      { event: "MENU_UP", action: "inventory_cursor_up", target_state: "FE_INVENTORY_MENU" },
      { event: "MENU_DOWN", action: "inventory_cursor_down", target_state: "FE_INVENTORY_MENU" },
      { event: "SELECT", guard: "has_selected_inventory_equipment", action: "equip_selected_inventory", target_state: "FE_INVENTORY_MENU" },
      { event: "SELL", guard: "has_selected_inventory_equipment", action: "sell_selected_inventory", target_state: "FE_INVENTORY_MENU" },
      { event: "ESCAPE", target_state: "FE_PLAYER_TURN" }
    ]
  },
  // --- 施設メニュー状態群 ---
  FE_SHOP_MENU: {
    role: "frontend",
    next_transitions: [
      { event: "MENU_UP",   action: "shop_cursor_up",   target_state: "FE_SHOP_MENU" },
      { event: "MENU_DOWN", action: "shop_cursor_down", target_state: "FE_SHOP_MENU" },
      { event: "SELECT",    guard: "can_afford_shop_item", action: "execute_buy", target_state: "FE_SHOP_MENU" },
      { event: "ESCAPE",    target_state: "FE_PLAYER_TURN" } // 操作不能ロックを完全に分離
    ]
  },
  FE_WARP_MENU: {
    role: "frontend",
    next_transitions: [
      { event: "MENU_UP", action: "warp_cursor_up", target_state: "FE_WARP_MENU" },
      { event: "MENU_DOWN", action: "warp_cursor_down", target_state: "FE_WARP_MENU" },
      { event: "SELECT", guard: "has_selected_warp_destination", action: "enter_selected_warp", target_state: "FE_GENERATE_MAP" },
      { event: "ESCAPE", target_state: "FE_PLAYER_TURN" }
    ]
  },
  FE_INN_MENU: {
    role: "frontend",
    next_transitions: [
      { event: "SELECT", guard: "can_afford_inn", action: "execute_inn_rest", target_state: "FE_PLAYER_TURN" },
      { event: "ESCAPE", target_state: "FE_PLAYER_TURN" }
    ]
  },
  FE_BAR_MENU: {
    role: "frontend",
    next_transitions: [
      { event: "ESCAPE", target_state: "FE_PLAYER_TURN" },
      { event: "SELECT", target_state: "FE_PLAYER_TURN" }
    ]
  },
  FE_HOME_PURCHASE_MENU: {
    role: "frontend",
    next_transitions: [
      { event: "SELECT", guard: "can_afford_home_purchase", action: "purchase_home", target_state: "FE_GENERATE_MAP" },
      { event: "ESCAPE", target_state: "FE_PLAYER_TURN" }
    ]
  },
  FE_BLACKSMITH_LOCKED_MENU: {
    role: "frontend",
    next_transitions: [
      { event: "SELECT", target_state: "FE_PLAYER_TURN" },
      { event: "ESCAPE", target_state: "FE_PLAYER_TURN" }
    ]
  },
  FE_HOME_MENU: {
    role: "frontend",
    next_transitions: [
      { event: "MENU_UP", action: "home_cursor_up", target_state: "FE_HOME_MENU" },
      { event: "MENU_DOWN", action: "home_cursor_down", target_state: "FE_HOME_MENU" },
      { event: "SELECT", guard: "home_selected_carried_equipment", action: "deposit_home_equipment", target_state: "FE_HOME_MENU" },
      { event: "SELECT", guard: "home_selected_stored_equipment", action: "withdraw_home_equipment", target_state: "FE_HOME_MENU" },
      { event: "SELECT", guard: "home_selected_deposit_gold", action: "deposit_home_gold", target_state: "FE_HOME_MENU" },
      { event: "SELECT", guard: "home_selected_withdraw_gold", action: "withdraw_home_gold", target_state: "FE_HOME_MENU" },
      { event: "ESCAPE", target_state: "FE_PLAYER_TURN" }
    ]
  },
  FE_DARK_SMITH_MENU: {
    role: "frontend",
    next_transitions: [
      { event: "MENU_UP", action: "dark_smith_cursor_up", target_state: "FE_DARK_SMITH_MENU" },
      { event: "MENU_DOWN", action: "dark_smith_cursor_down", target_state: "FE_DARK_SMITH_MENU" },
      { event: "SELECT", guard: "can_attempt_dark_smith_upgrade", action: "attempt_dark_smith_upgrade", target_state: "FE_DARK_SMITH_MENU" },
      { event: "OPEN_DISMANTLE", action: "prepare_dark_smith_dismantle_menu", target_state: "FE_DARK_SMITH_DISMANTLE_MENU" },
      { event: "ESCAPE", target_state: "FE_PLAYER_TURN" }
    ]
  },
  FE_DARK_SMITH_DISMANTLE_MENU: {
    role: "frontend",
    next_transitions: [
      { event: "MENU_UP", action: "dark_smith_dismantle_cursor_up", target_state: "FE_DARK_SMITH_DISMANTLE_MENU" },
      { event: "MENU_DOWN", action: "dark_smith_dismantle_cursor_down", target_state: "FE_DARK_SMITH_DISMANTLE_MENU" },
      { event: "SELECT", guard: "has_selected_dark_smith_dismantle_item", target_state: "FE_DARK_SMITH_DISMANTLE_CONFIRM" },
      { event: "ESCAPE", action: "prepare_dark_smith_menu", target_state: "FE_DARK_SMITH_MENU" }
    ]
  },
  FE_DARK_SMITH_DISMANTLE_CONFIRM: {
    role: "frontend",
    next_transitions: [
      { event: "SELECT", guard: "has_selected_dark_smith_dismantle_item", action: "dismantle_selected_dark_smith_item", target_state: "FE_DARK_SMITH_DISMANTLE_MENU" },
      { event: "ESCAPE", target_state: "FE_DARK_SMITH_DISMANTLE_MENU" }
    ]
  },

  FE_BLACKSMITH_MENU: {
    role: "frontend",
    next_transitions: [
      { event: "MENU_UP", action: "blacksmith_cursor_up", target_state: "FE_BLACKSMITH_MENU" },
      { event: "MENU_DOWN", action: "blacksmith_cursor_down", target_state: "FE_BLACKSMITH_MENU" },
      { event: "SELECT", guard: "has_selected_blacksmith_item", action: "prepare_blacksmith_kind", target_state: "FE_BLACKSMITH_KIND_MENU" },
      { event: "ESCAPE", target_state: "FE_PLAYER_TURN" }
    ]
  },
  FE_BLACKSMITH_KIND_MENU: {
    role: "frontend",
    next_transitions: [
      { event: "MENU_UP", action: "blacksmith_kind_up", target_state: "FE_BLACKSMITH_KIND_MENU" },
      { event: "MENU_DOWN", action: "blacksmith_kind_down", target_state: "FE_BLACKSMITH_KIND_MENU" },
      { event: "SELECT", guard: "can_afford_blacksmith", action: "roll_blacksmith_proposal", target_state: "FE_BLACKSMITH_COMPARE" },
      { event: "ESCAPE", target_state: "FE_BLACKSMITH_MENU" }
    ]
  },
  FE_BLACKSMITH_COMPARE: {
    role: "frontend",
    next_transitions: [
      { event: "SELECT", guard: "has_blacksmith_proposal", action: "accept_blacksmith_proposal", target_state: "FE_BLACKSMITH_MENU" },
      { event: "ESCAPE", action: "reject_blacksmith_proposal", target_state: "FE_BLACKSMITH_MENU" }
    ]
  },
  FE_ABYSS_ENTRY_MENU: {
    role: "frontend",
    next_transitions: [
      { event: "SELECT", action: "enter_abyss_dungeon", target_state: "FE_GENERATE_MAP" },
      { event: "ESCAPE", target_state: "FE_PLAYER_TURN" }
    ]
  },
  FE_DEATH_SUMMARY: {
    role: "frontend",
    next_transitions: [
      { event: "RETURN_TO_TOWN", action: "return_to_town_after_death", target_state: "FE_GENERATE_MAP" },
      { event: "ESCAPE", target_state: "FE_TITLE" }
    ]
  },
  FE_VICTORY: {
    role: "frontend",
    next_transitions: [
      { event: "ESCAPE", target_state: "FE_TITLE" },
      { event: "START", action: "init_game_data", target_state: "FE_GENERATE_MAP" }
    ]
  }
};


// ==========================================
// 2. Projection Policy (state -> overlay/input mode)
// ==========================================
const PROJECTION_POLICY = {
  FE_TITLE:                  { overlay: "title",         inputMode: "title" },
  FE_GENERATE_MAP:           { overlay: null,            inputMode: "locked" },
  FE_PLAYER_TURN:            { overlay: null,            inputMode: "gameplay" },
  FE_RESOLVE_PLAYER:         { overlay: null,            inputMode: "locked" },
  FE_ENEMY_TURN:             { overlay: null,            inputMode: "locked" },
  FE_TURN_END:               { overlay: null,            inputMode: "locked" },
  FE_PROCESS_TURN_LIFECYCLE: { overlay: null,            inputMode: "locked" },
  FE_CHECK_TURN_OUTCOME:     { overlay: null,            inputMode: "locked" },
  FE_DEATH_RESOLVE:          { overlay: null,            inputMode: "locked" },
  FE_INVENTORY_MENU:        { overlay: "inventory",     inputMode: "inventory-menu" },
  FE_SHOP_MENU:              { overlay: "shop",          inputMode: "list-menu" },
  FE_WARP_MENU:              { overlay: "warp",          inputMode: "list-menu" },
  FE_INN_MENU:               { overlay: "inn",           inputMode: "confirm-menu" },
  FE_BAR_MENU:               { overlay: "bar",           inputMode: "confirm-menu" },
  FE_HOME_PURCHASE_MENU:     { overlay: "home-purchase", inputMode: "confirm-menu" },
  FE_BLACKSMITH_LOCKED_MENU:      { overlay: "smith-locked",  inputMode: "confirm-menu" },
  FE_HOME_MENU:              { overlay: "home",          inputMode: "list-menu" },
  FE_DARK_SMITH_MENU:             { overlay: "dark-smith", inputMode: "dark-smith-menu" },
  FE_DARK_SMITH_DISMANTLE_MENU:   { overlay: "dark-smith-dismantle", inputMode: "list-menu" },
  FE_DARK_SMITH_DISMANTLE_CONFIRM:{ overlay: "dark-smith-dismantle-confirm", inputMode: "confirm-menu" },
  FE_BLACKSMITH_MENU:        { overlay: "blacksmith", inputMode: "list-menu" },
  FE_BLACKSMITH_KIND_MENU:   { overlay: "blacksmith-kind", inputMode: "list-menu" },
  FE_BLACKSMITH_COMPARE:     { overlay: "blacksmith-compare", inputMode: "confirm-menu" },
  FE_ABYSS_ENTRY_MENU:       { overlay: "abyss-entry",   inputMode: "confirm-menu" },
  FE_DEATH_SUMMARY:          { overlay: "death-summary", inputMode: "death-summary" },
  FE_VICTORY:                { overlay: "victory",       inputMode: "victory" }
};

const INPUT_EVENT_BY_MODE = {
  title: { Enter: "START" },
  gameplay: {
    ArrowUp: "MOVE_UP", ArrowDown: "MOVE_DOWN", ArrowLeft: "MOVE_LEFT", ArrowRight: "MOVE_RIGHT",
    " ": "PLACE_BOMB", ".": "PASS", i: "OPEN_INVENTORY", I: "OPEN_INVENTORY", r: "USE_RETURN_SCROLL", R: "USE_RETURN_SCROLL", Enter: "INTERACT", Escape: "ESCAPE"
  },

function addLog(ctx, msg) {
  ctx.logs.push(msg);
  if (ctx.logs.length > 4) ctx.logs.shift();
}

function coordinateKey(x, y) { return `${x},${y}`; }

function isReservedPosition(ctx, x, y) {
  if (ctx.player.x === x && ctx.player.y === y) return true;
  if (ctx.enemies.some(e => e.x === x && e.y === y)) return true;
  if (ctx.items.some(i => i.x === x && i.y === y)) return true;
  if (ctx.bombs && ctx.bombs.some(b => b.x === x && b.y === y)) return true;
  return Object.prototype.hasOwnProperty.call(ctx.tiles, coordinateKey(x, y));
}

function getEmptyFloorPos(ctx) {
  const candidates = [];
  for (let y = 1; y < 14; y++) {
    for (let x = 1; x < 14; x++) {
      if (ctx.grid[y][x] === 0 && !isReservedPosition(ctx, x, y)) candidates.push({ x, y });
    }
  }
  if (candidates.length === 0) return null;
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function getReachableFloorPositions(ctx, start = ctx.player) {
  const queue = [{ x: start.x, y: start.y }];
  const visited = new Set([coordinateKey(start.x, start.y)]);
  const result = [];
  const directions = [[1,0],[-1,0],[0,1],[0,-1]];
  while (queue.length) {
    const current = queue.shift();
    result.push(current);
    for (const [dx, dy] of directions) {
      const nx = current.x + dx;
      const ny = current.y + dy;
      const key = coordinateKey(nx, ny);
      if (nx < 1 || nx > 13 || ny < 1 || ny > 13) continue;
      if (ctx.grid[ny][nx] !== 0 || visited.has(key)) continue;
      visited.add(key);
      queue.push({ x: nx, y: ny });
    }
  }
  return result;
}

function getEmptyReachableFloorPos(ctx) {
  const candidates = getReachableFloorPositions(ctx).filter(pos => !isReservedPosition(ctx, pos.x, pos.y));
  if (candidates.length === 0) return null;
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function hasWalkablePath(grid, start, goal) {
  const queue = [start];
  const visited = new Set([coordinateKey(start.x, start.y)]);
  const directions = [[1,0],[-1,0],[0,1],[0,-1]];
  while (queue.length) {
    const current = queue.shift();
    if (current.x === goal.x && current.y === goal.y) return true;
    for (const [dx, dy] of directions) {
      const nx = current.x + dx;
      const ny = current.y + dy;
      const key = coordinateKey(nx, ny);
      if (nx < 1 || nx > 13 || ny < 1 || ny > 13) continue;
      if (grid[ny][nx] !== 0 || visited.has(key)) continue;
      visited.add(key);
      queue.push({ x: nx, y: ny });
    }
  }
  return false;
}

function carveGuaranteedPath(grid, start, goal) {
  let x = start.x;
  let y = start.y;
  grid[y][x] = 0;
  while (x !== goal.x) {
    x += Math.sign(goal.x - x);
    grid[y][x] = 0;
  }
  while (y !== goal.y) {
    y += Math.sign(goal.y - y);
    grid[y][x] = 0;
  }
}

// ------------------------------------------
// 3B. Dungeon generation and reachability
// ------------------------------------------
function generateReachableDungeonGrid(start, stairs, depth) {
  const wallChance = Math.min(0.27, 0.14 + Math.log10(depth + 1) * 0.035);
  for (let attempt = 0; attempt < 30; attempt++) {
    const grid = Array(15).fill(null).map(() => Array(15).fill(0));
    for (let i = 0; i < 15; i++) {
      grid[0][i] = 2; grid[14][i] = 2;
      grid[i][0] = 2; grid[i][14] = 2;
    }
    for (let y = 1; y < 14; y++) {
      for (let x = 1; x < 14; x++) {
        if ((x === start.x && y === start.y) || (x === stairs.x && y === stairs.y)) continue;
        if (Math.random() < wallChance) grid[y][x] = 1;
      }
    }
    if (hasWalkablePath(grid, start, stairs)) return grid;
  }

  const fallback = Array(15).fill(null).map(() => Array(15).fill(0));
  for (let i = 0; i < 15; i++) {
    fallback[0][i] = 2; fallback[14][i] = 2;
    fallback[i][0] = 2; fallback[i][14] = 2;
  }
  for (let y = 1; y < 14; y++) {
    for (let x = 1; x < 14; x++) {
      if (Math.random() < wallChance) fallback[y][x] = 1;
    }
  }
  carveGuaranteedPath(fallback, start, stairs);
  return fallback;
}

const RARITY_DEFINITIONS = {

const RARITY_ORDER = ['common', 'rare', 'very_rare', 'ultra_rare'];
const RARITY_RANK = Object.fromEntries(RARITY_ORDER.map((rarity, index) => [rarity, index]));

const EQUIPMENT_OPTION_DEFINITIONS = {
  weapon: [
    { id: 'edge', name: 'Keen Edge' },
    { id: 'slayer', name: 'Slayer Mark' },
    { id: 'ruin', name: 'Ruin Engraving' }
  ],
  armor: [
    { id: 'ward', name: 'Warding' },
    { id: 'fortitude', name: 'Fortitude' },
    { id: 'bastion', name: 'Bastion Seal' }
  ]
};

function optionRarityProbabilities(itemRarity = 'common') {
  const itemRank = RARITY_RANK[itemRarity] || 0;
  const rare = 0.16 + itemRank * 0.055;
  const veryRare = 0.035 + itemRank * 0.025;
  const ultraRare = 0.005 + itemRank * 0.008;
  return { common: 1 - rare - veryRare - ultraRare, rare, very_rare: veryRare, ultra_rare: ultraRare };
}

function rollEquipmentOptionRarity(itemRarity = 'common', roll = Math.random()) {
  const probabilities = optionRarityProbabilities(itemRarity);
  let cumulative = 0;
  for (const rarity of RARITY_ORDER) {
    cumulative += probabilities[rarity];
    if (roll < cumulative) return rarity;
  }
  return 'common';
}

function deterministicEquipmentOptionRolls(depth, type, quality, itemRarity) {
  const source = `${depth}|${type}|${quality.toFixed(8)}|${itemRarity}`;
  let hash = 2166136261;
  for (let index = 0; index < source.length; index++) {
    hash ^= source.charCodeAt(index);
    hash = Math.imul(hash, 16777619);
  }
  const next = () => {
    hash = (Math.imul(hash, 1664525) + 1013904223) >>> 0;
    return hash / 0x100000000;
  };
  return { chance: next(), rarity: next(), kind: next() };
}

function createEquipmentOption(type, totalPower, itemRarity = 'common', rolls = {}) {
  const chanceRoll = rolls.chance ?? Math.random();
  const optionChance = 0.48 + (RARITY_RANK[itemRarity] || 0) * 0.10;
  if (chanceRoll >= optionChance) return null;
  const definitions = EQUIPMENT_OPTION_DEFINITIONS[type] || [];
  if (definitions.length === 0) return null;
  const rarity = rollEquipmentOptionRarity(itemRarity, rolls.rarity ?? Math.random());
  const rarityMultiplier = { common: 0.08, rare: 0.12, very_rare: 0.17, ultra_rare: 0.23 }[rarity];
  const value = Math.max(1, Math.min(Math.max(1, totalPower - 1), Math.round(totalPower * rarityMultiplier)));
  const definition = definitions[Math.floor((rolls.kind ?? Math.random()) * definitions.length) % definitions.length];
  return { id: definition.id, name: definition.name, rarity, effect: 'primary_stat', value, enhancementSuccesses: 0 };
}

function equipmentOptionSummary(item) {
  const options = item?.options || [];
  if (options.length === 0) return 'No option';
  return options.map(option => {
    const enhanced = option.enhancementSuccesses || 0;
    return `${rarityLabel(option.rarity)} ${option.name} +${option.value}${enhanced > 0 ? ` (Forge +${enhanced})` : ''}`;
  }).join(', ');
}

function rollBlacksmithRarity(roll = Math.random()) {
  let cumulative = 0;
  for (let index = 0; index < BLACKSMITH_CONFIG.rarityWeights.length; index++) {
    cumulative += BLACKSMITH_CONFIG.rarityWeights[index];
    if (roll < cumulative) return RARITY_ORDER[index];
  }
  return 'ultra_rare';
}

function equipmentBasePower(item) {
  if (Number.isFinite(item?.basePower)) return item.basePower;
  const statKey = item?.type === 'weapon' ? 'atk' : 'def';
  const optionPower = (item?.options || []).reduce((sum, option) => sum + (option.value || 0), 0);
  return Math.max(1, (item?.[statKey] || 1) - optionPower);
}

function synchronizeEquipmentPower(item) {
  if (!item) return item;
  const statKey = item.type === 'weapon' ? 'atk' : 'def';
  const optionPower = (item.options || []).reduce((sum, option) => sum + (option.value || 0), 0);
  item[statKey] = Math.max(1, equipmentBasePower(item) + optionPower);
  return item;
}

function createBlacksmithProposal(entry, kind) {
  if (!entry?.item) return null;
  const original = entry.item;
  const candidate = structuredClone(original);
  candidate.basePower = equipmentBasePower(original);
  if (kind === 'rarity') {
    const nextRarity = rollBlacksmithRarity();
    const oldQuality = RARITY_DEFINITIONS[original.rarity || 'common'].dropQuality;
    const nextQuality = RARITY_DEFINITIONS[nextRarity].dropQuality;
    candidate.rarity = nextRarity;
    candidate.basePower = Math.max(1, Math.round(candidate.basePower * nextQuality / oldQuality));
    candidate.value = Math.max(1, Math.round((original.value || 1) * nextQuality / oldQuality));
    synchronizeEquipmentPower(candidate);
  } else {
    const totalPower = original.type === 'weapon' ? original.atk : original.def;
    candidate.options = [createEquipmentOption(original.type, Math.max(2, totalPower), original.rarity || 'common', { chance: 0, rarity: Math.random(), kind: Math.random() })];
    synchronizeEquipmentPower(candidate);
  }
  return { source: entry.source, index: entry.index, kind, original: structuredClone(original), candidate };
}

function applyBlacksmithProposal(ctx) {
  const proposal = ctx.blacksmithProposal;
  if (!proposal) return;
  if (proposal.source === 'weapon') ctx.player.weapon = proposal.candidate;
  else if (proposal.source === 'armor') ctx.player.armor = proposal.candidate;
  else if (ctx.equipmentInventory[proposal.index]) ctx.equipmentInventory[proposal.index] = proposal.candidate;
}

}

function levelSurplusForDepth(ctx, depth) {
  return Math.max(0, Math.min(30, ctx.player.level - recommendedLevelForDepth(depth)));
}

function rarityProbabilities(ctx, depth, isBoss = false) {
  const surplus = levelSurplusForDepth(ctx, depth);
  let rare = (isBoss ? 0.10 : 0.04) + surplus * (isBoss ? 0.012 : 0.006);
  let veryRare = (isBoss ? 0.02 : 0.006) + surplus * (isBoss ? 0.004 : 0.0018);
  let ultraRare = (isBoss ? 0.003 : 0.0005) + surplus * (isBoss ? 0.0012 : 0.00035);
  const cap = isBoss ? 0.72 : 0.40;
  const raw = rare + veryRare + ultraRare;
  if (raw > cap) {
    const scale = cap / raw;
    rare *= scale; veryRare *= scale; ultraRare *= scale;
  }
  return { common: 1 - rare - veryRare - ultraRare, rare, very_rare: veryRare, ultra_rare: ultraRare };
}

function rollRarity(ctx, depth, isBoss = false, roll = Math.random()) {
  const probabilities = rarityProbabilities(ctx, depth, isBoss);
  let cumulative = 0;
  for (const rarity of RARITY_ORDER) {
    cumulative += probabilities[rarity];
    if (roll < cumulative) return rarity;
  }
  return 'common';
}

function rarityLabel(rarity) {
  return RARITY_DEFINITIONS[rarity]?.label || RARITY_DEFINITIONS.common.label;
}

function rarityClassName(rarity) {
  return `rarity-${(rarity || 'common').replace('_', '-')}`;
}

function coloredEquipmentName(item) {
  if (!item) return '';
  return `<span class="${rarityClassName(item.rarity)}">${item.name}</span>`;
}

function applyEnemyRarity(enemy, rarity) {
  const definition = RARITY_DEFINITIONS[rarity] || RARITY_DEFINITIONS.common;
  enemy.rarity = rarity;
  enemy.hp = Math.max(1, Math.floor(enemy.hp * definition.hpMultiplier));
  enemy.maxHp = enemy.hp;
  enemy.atk = Math.max(1, Math.floor(enemy.atk * definition.attackMultiplier));
  enemy.exp = Math.max(1, Math.floor(enemy.exp * definition.expMultiplier));
  if (enemy.magicEvery) enemy.magicEvery = Math.max(2, Math.round(enemy.magicEvery * definition.magicRateMultiplier));
  if (enemy.isFoodEnemy && enemy.foodDrop) enemy.foodDrop.rarity = rarity;
  if (rarity !== 'common') enemy.name = `${definition.label} ${enemy.name}`;
  return enemy;
}

function withItemRarity(item, rarity = 'common') {
  return { ...item, rarity };
}

function fiveFloorPowerMultiplier(depth) {
  const completedBands = Math.max(0, Math.floor((depth - 1) / 5));
  return 1 + Math.min(BALANCE_CONFIG.fiveFloorStepCap, completedBands * BALANCE_CONFIG.fiveFloorStepRate);
}

function rollMapThreatProfile(roll = Math.random()) {
  let cumulative = 0;
  for (const profile of MAP_THREAT_PROFILES) {
    cumulative += profile.weight;
    if (roll < cumulative) return profile;
  }
  return MAP_THREAT_PROFILES[1];
}

function regularEnemyBudget(depth, profile, isBossFloor, mode = 'standard') {
  const fiveFloorBand = Math.floor((depth - 1) / 5);
  const base = 3.9 + Math.log2(depth + 1) * 0.82 + Math.min(4.2, fiveFloorBand * 0.022);
  const modeMultiplier = mode === 'abyss' ? ABYSS_CONFIG.enemyBudgetMultiplier : 1;
  return base * profile.budgetMultiplier * (isBossFloor ? 0.66 : 1.0) * modeMultiplier;
}

function unlockedEnemyArchetypes(depth) {
  return ENEMY_ARCHETYPES.filter(archetype => depth >= archetype.unlockFloor);
}

function chooseEnemyArchetype(depth, counts = {}, roll = Math.random()) {
  const choices = unlockedEnemyArchetypes(depth).map(archetype => {
    let weight = archetype.weight;
    if (archetype.name === 'Cave Rat') {
      weight *= depth <= 5 ? 1 : Math.max(0.12, 0.48 - depth / 500);
      if ((counts['Cave Rat'] || 0) >= 2) weight *= 0.08;
    }
    if ((counts[archetype.name] || 0) >= 2) weight *= 0.35;
    return { archetype, weight };
  });
  const total = choices.reduce((sum, entry) => sum + entry.weight, 0);
  let cursor = roll * total;
  for (const entry of choices) {
    cursor -= entry.weight;
    if (cursor <= 0) return entry.archetype;
  }
  return choices[choices.length - 1].archetype;
}

function recommendedLevelForDepth(depth) {
  return 1 + Math.floor(depth * BALANCE_CONFIG.recommendedLevelPerFloor);

function expToNextLevel(level) {
  return Math.floor(18 + 12 * Math.pow(level, 1.32));
}

function playerLevelMaxHp(level) {
  return BALANCE_CONFIG.playerBaseHp + Math.max(0, level - 1) * BALANCE_CONFIG.levelHpGain;
}

function recomputePlayerMaxHp(ctx) {
  const permanentBonus = Math.max(0, Number(ctx.player.permanentMaxHpBonus) || 0);
  ctx.player.maxHp = playerLevelMaxHp(ctx.player.level) + permanentBonus;
  return ctx.player.maxHp;
}

function combatBaseForLevel(level) {
  return {
    hp: 16 + level * 4.8,
    atk: 3.5 + level * 1.18,
    exp: 5 + level * 2.1
  };
}

function equipmentPowerForDepth(depth, type, quality = 1) {
  const level = recommendedLevelForDepth(depth);
  const base = type === 'weapon' ? 5 + level * 1.34 : 2 + level * 0.96;
  return Math.max(1, Math.floor(base * quality));
}

function createEnemy(ctxOrDepth, depthOrId, idOrRarity = null, forcedRarity = null, forcedArchetype = null) {

  const recommended = recommendedLevelForDepth(depth);
  const base = forcedArchetype || chooseEnemyArchetype(depth);

  const depthStep = fiveFloorPowerMultiplier(depth);

    exp: Math.max(1, Math.floor(stats.exp * base.expFactor * depthStep)),
    threatCost: base.threatCost,
    archetype: base.name,
    enemyLevel: recommended,
    magicType: base.magicType || null,

  enemy.maxHp = enemy.hp;

function townSafeCorridorKeys() {
  const keys = new Set();
  const paths = [
    [{x:7,y:12},{x:3,y:3}],
    [{x:7,y:12},{x:11,y:3}],
    [{x:7,y:12},{x:11,y:11}],
    [{x:7,y:12},{x:7,y:3}],
    [{x:7,y:12},{x:7,y:11}],
    [{x:7,y:12},{x:11,y:7}]
  ];
  for (const [start, goal] of paths) {
    let x=start.x, y=start.y;
    keys.add(coordinateKey(x,y));
    while (x !== goal.x) { x += Math.sign(goal.x-x); keys.add(coordinateKey(x,y)); }
    while (y !== goal.y) { y += Math.sign(goal.y-y); keys.add(coordinateKey(x,y)); }
  }
  return keys;
}

function availableTownEnemyPositions(ctx) {
  const safe = townSafeCorridorKeys();
  const facilities = [{x:3,y:3},{x:11,y:3},{x:3,y:11},{x:11,y:11},{x:7,y:3},{x:7,y:11},{x:11,y:7}];
  return getReachableFloorPositions(ctx).filter(pos => {
    if (isReservedPosition(ctx, pos.x, pos.y)) return false;
    if (Math.abs(pos.x-ctx.player.x)+Math.abs(pos.y-ctx.player.y) < 4) return false;
    if (safe.has(coordinateKey(pos.x,pos.y))) return false;
    return facilities.every(f => Math.abs(pos.x-f.x)+Math.abs(pos.y-f.y) > 1);
  });
}

function enforceTownThreatMix(ctx, phase) {
  const profile = TOWN_NIGHT_PROFILES[phase] || TOWN_NIGHT_PROFILES[3];
  const enemies = ctx.enemies.filter(enemy => enemy.isTownEnemy);
  const rank = { safe:0, even:1, dangerous:2, deadly:3 };
  const countAtLeast = band => enemies.filter(enemy => rank[enemyThreatBand(ctx, enemy)] >= rank[band]).length;
  for (const [band, required] of [['deadly',profile.deadly],['dangerous',profile.dangerous],['even',profile.even]]) {
    let count=countAtLeast(band);
    if (count >= required) continue;
    const candidates=[...enemies].sort((a,b)=>enemyThreatScore(ctx,b)-enemyThreatScore(ctx,a));
    for (const enemy of candidates) {
      if (rank[enemyThreatBand(ctx,enemy)] >= rank[band]) continue;
      if (fortifyEnemyToThreatBand(ctx,enemy,band)) count++;
      if (count >= required) break;
    }
  }
}

function spawnTownNightForce(ctx, phase = ctx.timePhase) {
  ctx.enemies = ctx.enemies.filter(enemy => !enemy.isTownEnemy);
  const profile = TOWN_NIGHT_PROFILES[phase];
  if (!profile) return;
  const positions = availableTownEnemyPositions(ctx);
  const archetypes = [...TOWN_ENEMY_ARCHETYPES];
  if (phase === 3) archetypes.splice(archetypes.findIndex(a=>a.name==='Moonlit Reaper'),1);
  for (let i=0; i<profile.count && positions.length; i++) {
    let base;
    if (phase === 4 && i === 0) base = TOWN_ENEMY_ARCHETYPES.find(a=>a.name==='Moonlit Reaper');
    else if (phase === 5 && i === 0) base = TOWN_ENEMY_ARCHETYPES.find(a=>a.name==='Graveyard Brute');
    else base = archetypes[Math.floor(Math.random()*archetypes.length)];
    const posIndex=Math.floor(Math.random()*positions.length);
    const pos=positions.splice(posIndex,1)[0];
    ctx.enemies.push({...createTownEnemy(ctx,phase,900000+phase*100+i,base),x:pos.x,y:pos.y});
  }
  enforceTownThreatMix(ctx,phase);
  addLog(ctx, `${profile.label} town threat: ${ctx.enemies.filter(e=>e.isTownEnemy).length} hostile entities stalk the streets.`);
}

function generateRandomEquipment(depth, type, qualityBias = 1, rarity = 'common') {
  const prefixes = ["Bronze", "Iron", "Steel", "Chitin", "Mithril", "Demonic", "Astral", "Chrono", "Eternal"];
  const ranks = ["E", "D", "C", "B", "A", "S", "SS", "SSS", "EX"];
  const tier = Math.min(prefixes.length - 1, Math.floor(Math.log2(Math.max(1, depth))));
  const quality = Math.max(0.9, qualityBias * (0.94 + Math.random() * 0.18));
  const power = equipmentPowerForDepth(depth, type, quality);
  const enhancement = Math.max(0, Math.floor((quality - 0.9) * 20));
  const option = createEquipmentOption(type, power, rarity, deterministicEquipmentOptionRolls(depth, type, quality, rarity));
  const options = option ? [option] : [];
  const basePower = Math.max(1, power - options.reduce((sum, current) => sum + current.value, 0));
  const optionValue = options.reduce((sum, current) => sum + current.value * (1 + RARITY_RANK[current.rarity]), 0);
  const value = Math.floor(18 + power * (type === 'weapon' ? 7 : 8) + optionValue * 3);
  const name = `${prefixes[tier]} ${type === 'weapon' ? 'Blade' : 'Aegis'} +${enhancement}`;
  const common = { name, type, rank: ranks[tier], value, rarity, options, basePower };
  return type === 'weapon'
    ? { ...common, atk: power }
    : { ...common, def: power };
}

function generateConsumable(depth, rarity = 'common') {
  const roll = Math.random();
  if (roll < 0.32) return withItemRarity({ name: "Trail Rations", type: "food", heal: 5, hunger: 48 }, rarity);
  if (roll < 0.55) return withItemRarity({ name: "Hunter's Stew", type: "food", heal: 18, hunger: 75 }, rarity);
  if (roll < 0.78) return withItemRarity({ name: "Greater Healing Flask", type: "potion", heal: 40 + recommendedLevelForDepth(depth) * 2, hunger: 8 }, rarity);
  if (roll < 0.94) return withItemRarity({ name: "Traveler's Feast", type: "food", heal: 25, hunger: 100 }, rarity);
  return withItemRarity({ name: "Elixir of Depth", type: "elixir", maxHp: 2 + Math.floor(Math.log10(depth + 1) * 2) }, rarity);
}

function applyLevelUps(ctx) {
  let leveled = false;
  while (ctx.player.exp >= ctx.player.nextExp) {
    ctx.player.exp -= ctx.player.nextExp;
    ctx.player.level++;
    recomputePlayerMaxHp(ctx);
    ctx.player.hp = ctx.player.maxHp;
    ctx.player.nextExp = expToNextLevel(ctx.player.level);
    leveled = true;
  }
  if (leveled) addLog(ctx, `LEVEL UP! Reached Level ${ctx.player.level}!`);
}

function createShopInventory(ctx) {
  const shopDepth = Math.max(1, ctx.maxReachedDepth, Math.floor(ctx.player.level / BALANCE_CONFIG.recommendedLevelPerFloor));
  const normalWeapon = generateRandomEquipment(shopDepth, 'weapon', 1.04);
  const premiumWeapon = generateRandomEquipment(shopDepth + 4, 'weapon', 1.12);
  const normalArmor = generateRandomEquipment(shopDepth, 'armor', 1.04);
  const premiumArmor = generateRandomEquipment(shopDepth + 4, 'armor', 1.12);
  return [
    { name: 'Travel Bread', type: 'food', hunger: 45, heal: 4, value: 8, stock: 5 },
    { name: 'Boar Jerky', type: 'food', hunger: 68, heal: 10, value: 16, stock: 3 },
    { name: 'Hunter Stew', type: 'food', hunger: 100, heal: 28, value: 28, stock: 2 },
    { name: 'Healing Flask', type: 'potion', heal: 45 + ctx.player.level * 2, hunger: 0, value: 24 + ctx.player.level, stock: 3 },
    { name: 'Return to Town Scroll', type: 'return_scroll', value: 5000, stock: 1 },
    { name: 'Full Recovery Tonic', type: 'full_restore', value: 55 + ctx.player.level * 2, stock: 1 },
    { ...normalWeapon, value: Math.floor(normalWeapon.value * 0.9), stock: 1 },
    { ...premiumWeapon, value: Math.floor(premiumWeapon.value * 1.15), stock: 1 },
    { ...normalArmor, value: Math.floor(normalArmor.value * 0.9), stock: 1 },
    { ...premiumArmor, value: Math.floor(premiumArmor.value * 1.15), stock: 1 },
    { name: 'Veteran Training Manual', type: 'training', exp: Math.floor(ctx.player.nextExp * 0.45), value: 45 + ctx.player.level * 3, stock: 1 },
    { name: 'Blast Range Amplifier', type: 'bomb_range', value: 650 + ctx.player.bombRangeShopPurchases * 850, stock: ctx.player.bombRangeShopPurchases < 3 ? 1 : 0 },
    { name: 'Bomb Harness Upgrade', type: 'bomb_capacity', value: 2200, stock: ctx.player.bombCapacityShopPurchases < 1 ? 1 : 0 }
  ];
}

const BOMB_CONFIG = {
  fuseTurns: 5,
  baseDamage: 55,
  playerDamageRatio: 0.55,
  bossDamageRatio: 0.72,
  maxCapacity: 5,
  maxRange: 8
};

const TREASURE_CONFIG = {
  chestSpawnChance: 0.10,
  rangeUpgradeChance: 0.015,
  capacityUpgradeChance: 0.003
};

function generateTreasureChestReward(ctx, roll = Math.random()) {
  if (roll < TREASURE_CONFIG.capacityUpgradeChance && ctx.player.bombCapacity < BOMB_CONFIG.maxCapacity) {
    return withItemRarity({ name: "Infinite Chamber Core", type: "bomb_capacity" }, "ultra_rare");
  }
  if (roll < TREASURE_CONFIG.capacityUpgradeChance + TREASURE_CONFIG.rangeUpgradeChance && ctx.player.bombRange < BOMB_CONFIG.maxRange) {
    return withItemRarity({ name: "Blast Radius Crystal", type: "bomb_range" }, "very_rare");
  }
  if (roll < 0.28) return withItemRarity({ name: "Treasure Gold", type: "gold", amount: 80 + ctx.depth * 12 }, "common");
  if (roll < 0.62) return generateConsumable(ctx.depth);
  const eqType = Math.random() > 0.5 ? "weapon" : "armor";
  return generateRandomEquipment(ctx.depth + 3, eqType, 1.14);
}

function equipmentPrimaryStat(item) {
  if (!item) return 0;
  return item.type === "weapon" ? (item.atk || 0) : (item.def || 0);
}

function isClearlyBetterEquipment(candidate, current) {
  if (!candidate || !current || candidate.type !== current.type) return false;
  const currentStat = equipmentPrimaryStat(current);
  const candidateStat = equipmentPrimaryStat(candidate);
  const requiredGain = Math.max(
    AUTO_EQUIP_CONFIG.minimumAbsoluteGain,
    Math.ceil(currentStat * AUTO_EQUIP_CONFIG.minimumRelativeGain)
  );
  return candidateStat - currentStat >= requiredGain;
}

function isClearlyWeakerEquipment(candidate, current) {
  if (!candidate || !current || candidate.type !== current.type) return false;
  const currentStat = equipmentPrimaryStat(current);
  const candidateStat = equipmentPrimaryStat(candidate);
  const requiredLoss = Math.max(
    AUTO_EQUIP_CONFIG.minimumAbsoluteLoss,
    Math.ceil(currentStat * AUTO_EQUIP_CONFIG.minimumRelativeLoss)
  );
  return currentStat - candidateStat >= requiredLoss;
}

function sellEquipmentAutomatically(ctx, equipment, reason) {
  const saleValue = Math.max(0, Math.floor((equipment.value || 0) / 2));
  ctx.player.gold += saleValue;
  addLog(ctx, `Auto-sold ${equipment.name} for ${saleValue}g (${reason}).`);
  return saleValue;
}

function shouldAutoSellEquipment(candidate, current) {
  const isUltraRareEquipment = candidate?.rarity === 'ultra_rare';
  return isClearlyWeakerEquipment(candidate, current)
    && !isUltraRareEquipment
    && !hasPreservableEquipmentOption(candidate);
}

function autoEquipOrStoreEquipment(ctx, item, floorPosition = null) {
  const { x, y, ...equipment } = item;
  const slot = equipment.type === "weapon" ? "weapon" : "armor";
  const current = ctx.player[slot];

  if (isClearlyBetterEquipment(equipment, current)) {
    ctx.player[slot] = equipment;
    if (shouldAutoSellEquipment(current, equipment)) {
      sellEquipmentAutomatically(ctx, current, 'replaced by a clearly stronger item');
      addLog(ctx, `Auto-equipped clearly better ${equipment.name}.`);
      return { removeFloor: true, autoEquipped: true, autoSold: true };
    }
    if (ctx.equipmentInventory.length < ctx.inventoryCapacity) {
      ctx.equipmentInventory.push(current);
      ctx.inventorySelectedIndex = ctx.equipmentInventory.length - 1;
      addLog(ctx, `Auto-equipped clearly better ${equipment.name}. Preserved ${current.name} for its option value.`);
      return { removeFloor: true, autoEquipped: true };
    }
    if (floorPosition) {
      Object.assign(item, current, floorPosition);
      addLog(ctx, `Auto-equipped clearly better ${equipment.name}. ${current.name} remains on the floor.`);
      return { removeFloor: false, autoEquipped: true };
    }
    ctx.player[slot] = current;
  }

  if (shouldAutoSellEquipment(equipment, current)) {
    sellEquipmentAutomatically(ctx, equipment, 'clearly weaker and no Rare option');
    return { removeFloor: true, autoEquipped: false, autoSold: true };
  }

  if (ctx.equipmentInventory.length >= ctx.inventoryCapacity) {
    const reason = hasPreservableEquipmentOption(equipment) ? 'Rare option preserved' : 'player comparison required';
    addLog(ctx, `Equipment inventory is full. ${equipment.name} remains on the floor (${reason}).`);
    return { removeFloor: false, autoEquipped: false };
  }
  ctx.equipmentInventory.push(equipment);
  ctx.inventorySelectedIndex = ctx.equipmentInventory.length - 1;
  const preservation = hasPreservableEquipmentOption(equipment) ? ' Rare option preserved for future smithing.' : '';
  addLog(ctx, `Stored ${equipment.name}.${preservation} Open Equipment with [I].`);
  return { removeFloor: true, autoEquipped: false };
}

function createTreasureChest(ctx, roll = Math.random()) {
  const reward = generateTreasureChestReward(ctx, roll);
  return withItemRarity({ name: "Ancient Treasure Chest", type: "chest", reward }, reward.rarity || 'common');
}


function applyTreasureReward(ctx, reward) {
  return executeTreasureRewardDispositionSfa(ctx, reward);
}

function playerBombs(ctx) {
  return ctx.bombs.filter(bomb => (bomb.source || 'player') === 'player');
}

function findNearestOpenBombCell(ctx, originX, originY) {
  const candidates = [{x: originX, y: originY}];
  for (let radius = 1; radius <= 4; radius++) {
    for (let dx = -radius; dx <= radius; dx++) {
      candidates.push({x: originX + dx, y: originY - radius}, {x: originX + dx, y: originY + radius});
    }
    for (let dy = -radius + 1; dy < radius; dy++) {
      candidates.push({x: originX - radius, y: originY + dy}, {x: originX + radius, y: originY + dy});
    }
  }
  return candidates.find(cell => cell.x >= 1 && cell.x <= 13 && cell.y >= 1 && cell.y <= 13 && ctx.grid[cell.y][cell.x] === 0 && !isBombAt(ctx, cell.x, cell.y));
}

function armMirrorReflections(ctx, mirror) {
  if (mirror.abyssRole !== 'mirror') return 0;
  let armed = 0;
  const candidates = playerBombs(ctx).filter(bomb => !(bomb.reflectedForBossIds || []).includes(mirror.id));
  for (const sourceBomb of candidates) {
    if (armed >= ABYSS_MIRROR_SPEC.maximumReflectionsPerTurn) break;
    sourceBomb.reflectedForBossIds = [...(sourceBomb.reflectedForBossIds || []), mirror.id];
    const reflectedX = 14 - sourceBomb.x;
    const reflectedY = 14 - sourceBomb.y;
    const target = findNearestOpenBombCell(ctx, reflectedX, reflectedY);
    if (!target) continue;
    ctx.bombs.push({
      id: `mirror-${mirror.id}-${sourceBomb.id}`,
      x: target.x,
      y: target.y,
      fuse: ABYSS_MIRROR_SPEC.reflectionFuseTurns,
      range: sourceBomb.range,
      placedTurn: ctx.turnCount,
      source: 'mirror',
      ownerId: mirror.id,
      mirroredFromBombId: sourceBomb.id,
      chainReactive: true
    });
    armed++;
    addLog(ctx, `${mirror.name} reflected your bomb across the chamber!`);
  }
  return armed;
}

function resolveHungerRole(ctx, enemy) {
  if (enemy.abyssRole !== 'hunger') return false;
  const edibleIndex = ctx.items.findIndex(item => item.type === 'food' && (item.rarity || 'common') !== 'ultra_rare');
  if (edibleIndex >= 0 && ctx.turnCount % 3 === 0) {
    const [food] = ctx.items.splice(edibleIndex, 1);
    const healed = Math.max(1, Math.floor(enemy.maxHp * 0.08));
    enemy.hp = Math.min(enemy.maxHp, enemy.hp + healed);
    addLog(ctx, `${enemy.name} devoured ${food.name} and restored ${healed} HP!`);
    return true;
  }
  return false;
}

function resolveDevourerRole(ctx, enemy) {
  if (enemy.abyssRole !== 'devourer' || ctx.turnCount % 4 !== 0) return false;
  const edibleIndex = ctx.items.findIndex(item => item.type === 'food' && (item.rarity || 'common') !== 'ultra_rare');
  if (edibleIndex < 0) return false;
  const [food] = ctx.items.splice(edibleIndex, 1);
  const healed = Math.max(1, Math.floor(enemy.maxHp * 0.12));
  enemy.hp = Math.min(enemy.maxHp, enemy.hp + healed);
  enemy.atk += 1;
  addLog(ctx, `${enemy.name} consumed ${food.name}, healed ${healed} HP, and grew stronger.`);
  return true;
}

// ------------------------------------------
// 3D. Bomb lifecycle and blast resolution
// The fundamental bomb rules remain fixed.
// ------------------------------------------
function isBombAt(ctx, x, y) {
  return ctx.bombs.some(bomb => bomb.x === x && bomb.y === y);
}

function bombDamage(ctx) {
  return BOMB_CONFIG.baseDamage + ctx.player.level * 9 + ctx.player.weapon.atk * 2;
}

const ENEMY_DROP_CONFIG = {
  dropChance: { common: 0.18, rare: 1.0, very_rare: 1.0, ultra_rare: 1.0 },
  equipmentChance: { common: 0.72, rare: 0.82, very_rare: 0.92, ultra_rare: 1.0 },
  itemRarityDistribution: {
    common: [0.82, 0.17, 0.01, 0.0],
    rare: [0.08, 0.46, 0.31, 0.15],
    very_rare: [0.0, 0.12, 0.53, 0.35],
    ultra_rare: [0.0, 0.0, 0.20, 0.80]
  }
};

function rollEnemyDropRarity(enemy, roll = Math.random()) {
  const rarity = enemy.rarity || 'common';
  let cumulative = 0;
  const row = ENEMY_DROP_CONFIG.itemRarityDistribution[rarity];
  for (let index = 0; index < row.length; index++) {
    cumulative += row[index];
    if (roll < cumulative) return RARITY_ORDER[index];
  }
  return 'common';
}

function createEnemyDrop(ctx, enemy) {
  const enemyRarity = enemy.rarity || 'common';
  if (Math.random() >= ENEMY_DROP_CONFIG.dropChance[enemyRarity]) return null;
  const rarity = rollEnemyDropRarity(enemy);
  const quality = RARITY_DEFINITIONS[rarity].dropQuality;
  if (Math.random() >= ENEMY_DROP_CONFIG.equipmentChance[enemyRarity]) return generateConsumable(ctx.depth, rarity);
  return generateRandomEquipment(ctx.depth + (enemy.isBoss ? 5 : 0), Math.random() < 0.5 ? 'weapon' : 'armor', quality, rarity);
}

function enemyGoldReward(depth, roll = Math.random()) {
  return Math.floor(roll * 10) + Math.max(1, depth) * 5;
}

function defeatEnemy(ctx, target, source = 'combat') {
  addLog(ctx, `${target.name} was defeated by ${source}! Gained +${target.exp} EXP.`);
  ctx.player.gold += enemyGoldReward(ctx.depth);
  ctx.player.exp += target.exp;
  ctx.enemies = ctx.enemies.filter(enemy => enemy.id !== target.id);
  if (target.isFoodEnemy && target.foodDrop) {
    ctx.items.push({ x: target.x, y: target.y, ...target.foodDrop });
    addLog(ctx, `${target.name} dropped ${target.foodDrop.name}.`);
  }
  const rarityDrop = target.isFoodEnemy ? null : createEnemyDrop(ctx, target);
  if (rarityDrop) {
    ctx.items.push({ x: target.x, y: target.y, ...rarityDrop });
    addLog(ctx, `${rarityLabel(rarityDrop.rarity)} drop: ${rarityDrop.name}.`);
  }
  if (target.isAbyssBoss) {
    if (!ctx.defeatedAbyssBossFloors.includes(target.abyssBossFloor)) ctx.defeatedAbyssBossFloors.push(target.abyssBossFloor);
    addLog(ctx, `Guardian of A${target.abyssBossFloor} defeated! The Abyss descent is unlocked.`);
  } else if (target.isBoss) {
    if (!ctx.defeatedBossFloors.includes(target.bossFloor)) ctx.defeatedBossFloors.push(target.bossFloor);
    addLog(ctx, `Guardian of B${target.bossFloor} defeated! The downward stairs are now unlocked.`);
  }
  applyLevelUps(ctx);
}

function resolveItemsInBlastCell(ctx, x, y) {
  const survivors = [];
  for (const item of ctx.items) {
    if (item.x !== x || item.y !== y) { survivors.push(item); continue; }
    if (item.type === 'chest') {
      const reward = item.reward;
      if ((reward.rarity || 'common') === 'ultra_rare') {
        survivors.push({ x, y, ...reward });
        addLog(ctx, `The chest broke open, but Ultra Rare ${reward.name} resisted the blast.`);
      } else {
        addLog(ctx, `The blast destroyed the chest and its ${rarityLabel(reward.rarity)} reward.`);
      }
      continue;
    }
    if (RARITY_DEFINITIONS[item.rarity || 'common'].blastProof) {
      survivors.push(item);
      addLog(ctx, `Ultra Rare ${item.name} resisted the blast.`);
    } else {
      addLog(ctx, `The blast destroyed ${rarityLabel(item.rarity)} ${item.name}.`);
    }
  }
  ctx.items = survivors;
}

function applyBlastDamage(ctx, x, y, damage) {
  const target = ctx.enemies.find(enemy => enemy.x === x && enemy.y === y);
  if (target) {
    const applied = Math.max(1, Math.floor(damage * (target.isBoss ? BOMB_CONFIG.bossDamageRatio : 1)));
    target.provoked = true;
    target.hasDetectedPlayer = true;
    target.hp -= applied;
    addLog(ctx, `${target.name} took ${applied} bomb damage!`);
    if (target.hp <= 0) defeatEnemy(ctx, target, 'a bomb blast');
  }
  if (ctx.player.x === x && ctx.player.y === y) {
    const selfDamage = Math.max(1, Math.floor(damage * BOMB_CONFIG.playerDamageRatio) - ctx.player.armor.def);
    ctx.player.hp = Math.max(0, ctx.player.hp - selfDamage);
    addLog(ctx, `You were caught in the blast for ${selfDamage} damage!`);
  }
}

function detonateBomb(ctx, bombId, detonated = new Set(), affected = new Set()) {
  if (detonated.has(bombId)) return;
  const bomb = ctx.bombs.find(candidate => candidate.id === bombId);
  if (!bomb) return;
  detonated.add(bombId);
  ctx.bombs = ctx.bombs.filter(candidate => candidate.id !== bombId);
  const damage = bombDamage(ctx);
  const blastCells = [{ x: bomb.x, y: bomb.y }];
  const directions = [[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dx, dy] of directions) {
    for (let distance = 1; distance <= bomb.range; distance++) {
      const x = bomb.x + dx * distance;
      const y = bomb.y + dy * distance;
      if (ctx.grid[y][x] === 2) break;
      blastCells.push({ x, y });
      if (ctx.grid[y][x] === 1) {
        ctx.grid[y][x] = 0;
        addLog(ctx, `The blast shattered a rock at ${x},${y}.`);
        break;
      }
    }
  }
  for (const cell of blastCells) {
    const key = coordinateKey(cell.x, cell.y);
    if (!ctx.explosionCells.includes(key)) ctx.explosionCells.push(key);
    const chainedBombs = ctx.bombs.filter(candidate => candidate.x === cell.x && candidate.y === cell.y && candidate.chainReactive !== false);
    chainedBombs.forEach(chained => detonateBomb(ctx, chained.id, detonated, affected));
    if (!affected.has(key)) {
      affected.add(key);
      resolveItemsInBlastCell(ctx, cell.x, cell.y);
      applyBlastDamage(ctx, cell.x, cell.y, damage);
    }
  }
  addLog(ctx, 'BOOM! The bomb exploded in a cross-shaped blast.');
}

function resolveBombsOnMapExit(ctx, destinationLabel) {
  const abandonedCount = ctx.bombs.length;
  if (abandonedCount <= 0) return 0;
  ctx.bombs = [];
  ctx.explosionCells = [];
  addLog(ctx, `${abandonedCount} armed bomb${abandonedCount === 1 ? "" : "s"} detonated behind you after leaving for ${destinationLabel}.`);
  return abandonedCount;
}

const BOMB_LIFECYCLE_SFA = Object.freeze({
  BOMB_LIFECYCLE_REQUESTED: {
    role: "shared",
    next_transitions: [
      { event: "PROCESS", action: "reset_bomb_explosion_projection", target_state: "BOMB_LIFECYCLE_FUSE_TICK" }
    ]
  },
  BOMB_LIFECYCLE_FUSE_TICK: {
    role: "shared",
    next_transitions: [
      { event: "AUTO", action: "tick_bomb_fuses", target_state: "BOMB_LIFECYCLE_READY_COLLECTION" }
    ]
  },
  BOMB_LIFECYCLE_READY_COLLECTION: {
    role: "shared",
    next_transitions: [
      { event: "AUTO", action: "collect_ready_bombs", target_state: "BOMB_LIFECYCLE_DETONATION" }
    ]
  },
  BOMB_LIFECYCLE_DETONATION: {
    role: "shared",
    next_transitions: [
      { event: "AUTO", guard: "bombs_are_ready", action: "detonate_ready_bombs", target_state: "BOMB_LIFECYCLE_DONE" },
      { event: "AUTO", guard: "always", target_state: "BOMB_LIFECYCLE_DONE" }
    ]
  },
  BOMB_LIFECYCLE_DONE: { role: "shared", next_transitions: [] }
});

function createBombLifecycleRuntime(ctx) {
  return { ctx, readyBombIds: [], detonated: new Set(), affected: new Set(), trace: [] };
}

const bombLifecycleGuards = {
  always: () => true,
  bombs_are_ready: runtime => runtime.readyBombIds.length > 0
};

const bombLifecycleActions = {
  reset_bomb_explosion_projection: runtime => {
    runtime.ctx.explosionCells = [];
  },
  tick_bomb_fuses: runtime => {
    runtime.ctx.bombs.forEach(bomb => {
      if (bomb.placedTurn === undefined || bomb.placedTurn < runtime.ctx.turnCount) bomb.fuse -= 1;
    });
  },
  collect_ready_bombs: runtime => {
    runtime.readyBombIds = runtime.ctx.bombs.filter(bomb => bomb.fuse <= 0).map(bomb => bomb.id);
  },
  detonate_ready_bombs: runtime => {
    runtime.readyBombIds.forEach(id => detonateBomb(runtime.ctx, id, runtime.detonated, runtime.affected));
  }
};

function executeBombLifecycleSfa(ctx) {
  const runtime = createBombLifecycleRuntime(ctx);
  const result = runLocalSfa(BOMB_LIFECYCLE_SFA, 'BOMB_LIFECYCLE_REQUESTED', 'PROCESS', runtime, bombLifecycleGuards, bombLifecycleActions);
  runtime.trace = result.trace;
  ctx.lastBombLifecycleDecision = {
    turn: ctx.turnCount,
    readyBombIds: runtime.readyBombIds.slice(),
    detonatedBombIds: Array.from(runtime.detonated),
    affectedCellCount: runtime.affected.size,
    trace: result.trace
  };
  return runtime;
}

function processBombLifecycle(ctx) {
  return executeBombLifecycleSfa(ctx);
}

// ------------------------------------------
// 3E. Enemy magic, detection, and threat projection
// ------------------------------------------
function warningCellsForSpell(spell) {
  const cells = [];
  if (spell.type === 'area') {
    cells.push({x: spell.x, y: spell.y});
    [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy]) => cells.push({x: spell.x+dx, y: spell.y+dy}));
  } else if (spell.type === 'line') {
    for (let i = 0; i <= spell.range; i++) cells.push({x: spell.x + spell.dx*i, y: spell.y + spell.dy*i});
  }
  return cells.filter(cell => cell.x >= 1 && cell.x <= 13 && cell.y >= 1 && cell.y <= 13);
}

function resolvePendingSpell(ctx, enemy) {
  const spell = enemy.pendingSpell;
  if (!spell) return false;
  const cells = warningCellsForSpell(spell);
  let hitPlayer = false;
  cells.forEach(cell => {
    if (ctx.grid[cell.y][cell.x] === 1) ctx.grid[cell.y][cell.x] = 0;
    if (ctx.player.x === cell.x && ctx.player.y === cell.y) hitPlayer = true;
  });
  if (hitPlayer) {
    const damage = Math.max(1, Math.floor(enemy.atk * 0.9) - Math.floor(ctx.player.armor.def * 0.5));
    ctx.player.hp = Math.max(0, ctx.player.hp - damage);
    addLog(ctx, `${enemy.name}'s rock-breaking magic hit you for ${damage}!`);
  } else {
    addLog(ctx, `${enemy.name}'s spell smashed the marked ground, but you escaped.`);
  }
  enemy.pendingSpell = null;
  return true;
}

function prepareEnemySpell(ctx, enemy) {
  if (!enemy.magicType || ctx.turnCount % enemy.magicEvery !== 0) return false;
  if (enemy.magicType === 'line') {
    const sameRow = enemy.y === ctx.player.y;
    const sameColumn = enemy.x === ctx.player.x;
    if (!sameRow && !sameColumn) return false;
    enemy.pendingSpell = {
      type: 'line', x: enemy.x, y: enemy.y,
      dx: sameRow ? Math.sign(ctx.player.x - enemy.x) : 0,
      dy: sameColumn ? Math.sign(ctx.player.y - enemy.y) : 0,
      range: 8
    };
    addLog(ctx, `${enemy.name} marks a rock-breaking magic line. Move now!`);
    return true;
  }
  enemy.pendingSpell = { type: 'area', x: ctx.player.x, y: ctx.player.y };
  addLog(ctx, `${enemy.name} marks a cross-shaped annihilation zone. Move now!`);
  return true;
}

function enemyVisionRange(enemy) {
  const rarityBonus = { common: 0, rare: 1, very_rare: 2, ultra_rare: 3 }[enemy.rarity || 'common'] || 0;
  const base = enemy.isBoss ? 9 : (enemy.magicType ? 8 : (enemy.isFoodEnemy ? 5 : 6));
  return base + rarityBonus;
}

function hasClearSightToPlayer(ctx, enemy) {
  let x0 = enemy.x;
  let y0 = enemy.y;
  const x1 = ctx.player.x;
  const y1 = ctx.player.y;
  const dx = Math.abs(x1 - x0);
  const sx = x0 < x1 ? 1 : -1;
  const dy = -Math.abs(y1 - y0);
  const sy = y0 < y1 ? 1 : -1;
  let error = dx + dy;

  while (!(x0 === x1 && y0 === y1)) {
    const doubled = 2 * error;
    if (doubled >= dy) { error += dy; x0 += sx; }
    if (doubled <= dx) { error += dx; y0 += sy; }
    if (x0 === x1 && y0 === y1) return true;
    if (!ctx.grid[y0] || ctx.grid[y0][x0] !== 0) return false;
  }
  return true;
}

function playerAttackPower(ctx) {
  return Math.max(1, Math.floor(ctx.player.level * BALANCE_CONFIG.playerLevelAttack + ctx.player.weapon.atk));
}

function enemyDamageAgainstPlayer(ctx, enemy) {
  const piercing = Math.max(0, Math.min(0.9, enemy.armorPiercing || 0));
  const effectiveDefense = Math.floor(ctx.player.armor.def * (1 - piercing));
  return Math.max(1, enemy.atk - effectiveDefense);
}

function enemyThreatScore(ctx, enemy) {
  // Threat presentation is deliberately based on full-health combat potential.
  // Damage taken during the current fight must not make the same enemy change color.
  const attack = playerAttackPower(ctx);
  const hitsToDefeat = Math.max(1, Math.ceil(Math.max(1, enemy.maxHp || enemy.hp) / attack));
  const incomingPerHit = enemyDamageAgainstPlayer(ctx, enemy);
  const retaliationHits = Math.max(0, hitsToDefeat - 1);
  const magicPressure = enemy.magicType ? incomingPerHit * 0.90 : 0;
  const expectedDamage = retaliationHits * incomingPerHit + magicPressure;
  return expectedDamage / Math.max(1, ctx.player.maxHp);
}

function enemyThreatBand(ctx, enemy) {
  if (enemy.isFoodEnemy && !enemy.provoked) return 'neutral';
  const score = enemyThreatScore(ctx, enemy);
  if (score <= 0.16) return 'safe';
  if (score <= 0.34) return 'even';
  if (score <= 0.68) return 'dangerous';
  return 'deadly';
}

function minimumThreatMix(profile, regularCount) {
  // Threat counts are cumulative. Keep some green enemies for pacing, while
  // making yellow/orange enemies a visible part of every normal floor.
  const ratios = {
    calm: { even: 0.42, dangerous: 0.16, deadly: 0.00 },
    standard: { even: 0.52, dangerous: 0.24, deadly: 0.00 },
    dangerous: { even: 0.62, dangerous: 0.34, deadly: 0.08 },
    deadly: { even: 0.72, dangerous: 0.46, deadly: 0.16 }
  }[profile.id] || { even: 0.52, dangerous: 0.24, deadly: 0.00 };
  const atLeast = (ratio, minimum) => Math.min(regularCount, Math.max(minimum, Math.ceil(regularCount * ratio)));
  return {
    even: atLeast(ratios.even, 2),
    dangerous: atLeast(ratios.dangerous, 1),
    deadly: ratios.deadly > 0 ? atLeast(ratios.deadly, 1) : 0
  };
}

function minimumEvenThreatCount(profile, regularCount) {
  return minimumThreatMix(profile, regularCount).even;
}

function fortifyEnemyToThreatBand(ctx, enemy, targetBand = 'even') {
  const targetScores = { even: 0.161, dangerous: 0.341, deadly: 0.681 };
  const targetScore = targetScores[targetBand] || targetScores.even;
  if (enemyThreatScore(ctx, enemy) >= targetScore) return false;
  const originalHp = enemy.maxHp;
  const originalAtk = enemy.atk;
  let multiplier = 1.0;
  while (enemyThreatScore(ctx, enemy) < targetScore && multiplier < 3.60) {
    multiplier += 0.08;
    enemy.maxHp = Math.max(1, Math.ceil(originalHp * multiplier));
    enemy.hp = enemy.maxHp;
    enemy.atk = Math.max(1, Math.ceil(originalAtk * (1 + (multiplier - 1) * 0.72)));
  }
  if (enemyThreatScore(ctx, enemy) < targetScore) return false;
  enemy.exp = Math.max(1, Math.ceil(enemy.exp * multiplier));
  enemy.isMapElite = true;
  if (!enemy.name.startsWith('Veteran ')) enemy.name = `Veteran ${enemy.name}`;
  return true;
}

function enforceMapThreatColorMix(ctx, profile) {
  const regulars = ctx.enemies.filter(enemy => !enemy.isBoss && !enemy.isFoodEnemy);
  const required = minimumThreatMix(profile, regulars.length);
  const rank = { safe: 0, even: 1, dangerous: 2, deadly: 3 };
  const countAtLeast = band => regulars.filter(enemy => rank[enemyThreatBand(ctx, enemy)] >= rank[band]).length;

  let deadlyCount = countAtLeast('deadly');
  if (deadlyCount < required.deadly) {
    const candidates = [...regulars].sort((a, b) => enemyThreatScore(ctx, b) - enemyThreatScore(ctx, a));
    for (const enemy of candidates) {
      if (rank[enemyThreatBand(ctx, enemy)] >= rank.deadly) continue;
      if (fortifyEnemyToThreatBand(ctx, enemy, 'deadly')) deadlyCount++;
      if (deadlyCount >= required.deadly) break;
    }
  }

  let dangerousCount = countAtLeast('dangerous');
  if (dangerousCount < required.dangerous) {
    const candidates = [...regulars].sort((a, b) => enemyThreatScore(ctx, b) - enemyThreatScore(ctx, a));
    for (const enemy of candidates) {
      if (rank[enemyThreatBand(ctx, enemy)] >= rank.dangerous) continue;
      if (fortifyEnemyToThreatBand(ctx, enemy, 'dangerous')) dangerousCount++;
      if (dangerousCount >= required.dangerous) break;
    }
  }

  let evenCount = countAtLeast('even');
  if (evenCount < required.even) {
    const candidates = [...regulars].sort((a, b) => enemyThreatScore(ctx, b) - enemyThreatScore(ctx, a));
    for (const enemy of candidates) {
      if (rank[enemyThreatBand(ctx, enemy)] >= rank.even) continue;
      if (fortifyEnemyToThreatBand(ctx, enemy, 'even')) evenCount++;
      if (evenCount >= required.even) break;
    }
  }
}

function updateEnemyDetection(ctx, enemy) {
  if (enemy.isFoodEnemy && !enemy.provoked) {
    enemy.hasDetectedPlayer = false;
    enemy.pendingSpell = null;
    return false;
  }
  if (enemy.isFoodEnemy && enemy.provoked) {
    enemy.hasDetectedPlayer = true;
    return true;
  }
  if (enemy.pendingSpell) {
    enemy.hasDetectedPlayer = true;
    return true;
  }
  const distance = Math.abs(ctx.player.x - enemy.x) + Math.abs(ctx.player.y - enemy.y);
  const canSeePlayer = distance <= enemyVisionRange(enemy) && hasClearSightToPlayer(ctx, enemy);
  enemy.hasDetectedPlayer = canSeePlayer;
  return canSeePlayer;
}

const ENEMY_MOVEMENT_POLICY = Object.freeze({
  HORIZONTAL_FIRST: "HORIZONTAL_FIRST",
  SHORTEST_PATH: "SHORTEST_PATH"
});

const ENEMY_TURN_POLICY = Object.freeze({
  iterationOrder: "ENEMY_ARRAY_ORDER",
  movementConflict: "FIRST_APPLIED_WINS",
  actionCardinality: "AT_MOST_ONCE_PER_TURN"
});

const ENEMY_PATHFINDING_CONFIG = Object.freeze({
  minimumRarity: "very_rare"
});

const ENEMY_MOVEMENT_POLICY_BY_ARCHETYPE = Object.freeze({
  // Archetype overrides remain available for future enemy-specific behavior.
  // The default population keeps the low-cost horizontal-first personality.
  default: ENEMY_MOVEMENT_POLICY.HORIZONTAL_FIRST
});

function enemyQualifiesForAStar(enemy) {
  if (enemy.isBoss) return true;
  const minimumRank = RARITY_RANK[ENEMY_PATHFINDING_CONFIG.minimumRarity];
  const enemyRank = RARITY_RANK[enemy.rarity || "common"] ?? 0;
  return enemyRank >= minimumRank;
}

function enemyMovementPolicy(enemy) {
  if (enemyQualifiesForAStar(enemy)) return ENEMY_MOVEMENT_POLICY.SHORTEST_PATH;
  return ENEMY_MOVEMENT_POLICY_BY_ARCHETYPE[enemy.archetype] || ENEMY_MOVEMENT_POLICY_BY_ARCHETYPE.default;
}

function isEnemyMovementCellBlocked(ctx, enemy, x, y) {
  if (x <= 0 || x >= 14 || y <= 0 || y >= 14) return true;
  if (ctx.grid[y][x] !== 0 || isBombAt(ctx, x, y)) return true;
  return ctx.enemies.some(other => other !== enemy && other.x === x && other.y === y);
}

function buildHorizontalFirstCandidates(ctx, enemy) {
  const dx = Math.sign(ctx.player.x - enemy.x);
  const dy = Math.sign(ctx.player.y - enemy.y);
  const candidates = [];
  if (dx !== 0) candidates.push({ x: enemy.x + dx, y: enemy.y, reason: "CHASE_HORIZONTAL" });
  if (dy !== 0) candidates.push({ x: enemy.x, y: enemy.y + dy, reason: "CHASE_VERTICAL" });
  return candidates;
}

function aStarHeuristic(x, y, targetX, targetY) {
  return Math.abs(targetX - x) + Math.abs(targetY - y);
}

function pushAStarNode(heap, node) {
  heap.push(node);
  let index = heap.length - 1;
  while (index > 0) {
    const parent = Math.floor((index - 1) / 2);
    const parentNode = heap[parent];
    if (parentNode.f < node.f || (parentNode.f === node.f && parentNode.order <= node.order)) break;
    heap[index] = parentNode;
    index = parent;
  }
  heap[index] = node;
}

function popAStarNode(heap) {
  if (heap.length === 0) return null;
  const root = heap[0];
  const tail = heap.pop();
  if (heap.length === 0) return root;
  let index = 0;
  while (true) {
    const left = index * 2 + 1;
    const right = left + 1;
    if (left >= heap.length) break;
    let child = left;
    if (right < heap.length) {
      const leftNode = heap[left];
      const rightNode = heap[right];
      if (rightNode.f < leftNode.f || (rightNode.f === leftNode.f && rightNode.order < leftNode.order)) child = right;
    }
    const childNode = heap[child];
    if (tail.f < childNode.f || (tail.f === childNode.f && tail.order <= childNode.order)) break;
    heap[index] = childNode;
    index = child;
  }
  heap[index] = tail;
  return root;
}

function buildShortestPathCandidates(ctx, enemy) {
  const startKey = `${enemy.x},${enemy.y}`;
  const targetKey = `${ctx.player.x},${ctx.player.y}`;
  if (startKey === targetKey) return [];

  const directions = [
    { x: 1, y: 0 },
    { x: 0, y: 1 },
    { x: -1, y: 0 },
    { x: 0, y: -1 }
  ];
  const openHeap = [];
  const bestCost = new Map([[startKey, 0]]);
  const previous = new Map();
  let insertionOrder = 0;
  pushAStarNode(openHeap, {
    x: enemy.x,
    y: enemy.y,
    g: 0,
    f: aStarHeuristic(enemy.x, enemy.y, ctx.player.x, ctx.player.y),
    order: insertionOrder++
  });

  while (openHeap.length > 0) {
    const current = popAStarNode(openHeap);
    const currentKey = `${current.x},${current.y}`;
    if (current.g !== bestCost.get(currentKey)) continue;

    for (const direction of directions) {
      const nextX = current.x + direction.x;
      const nextY = current.y + direction.y;
      const nextKey = `${nextX},${nextY}`;
      const isPlayerCell = nextKey === targetKey;
      if (!isPlayerCell && isEnemyMovementCellBlocked(ctx, enemy, nextX, nextY)) continue;

      const nextCost = current.g + 1;
      const knownCost = bestCost.get(nextKey);
      if (knownCost !== undefined && knownCost <= nextCost) continue;
      bestCost.set(nextKey, nextCost);
      previous.set(nextKey, currentKey);

      if (isPlayerCell) {
        let stepKey = nextKey;
        let parentKey = previous.get(stepKey);
        while (parentKey && parentKey !== startKey) {
          stepKey = parentKey;
          parentKey = previous.get(stepKey);
        }
        const [x, y] = stepKey.split(',').map(Number);
        return [{ x, y, reason: "A_STAR_SHORTEST_PATH" }];
      }

      pushAStarNode(openHeap, {
        x: nextX,
        y: nextY,
        g: nextCost,
        f: nextCost + aStarHeuristic(nextX, nextY, ctx.player.x, ctx.player.y),
        order: insertionOrder++
      });
    }
  }
  return [];
}

const ENEMY_MOVEMENT_CANDIDATE_BUILDERS = Object.freeze({
  [ENEMY_MOVEMENT_POLICY.HORIZONTAL_FIRST]: buildHorizontalFirstCandidates,
  [ENEMY_MOVEMENT_POLICY.SHORTEST_PATH]: buildShortestPathCandidates
});

function chooseEnemyChaseStep(ctx, enemy, blastThreatened = () => false, policyId = enemyMovementPolicy(enemy)) {
  const builder = ENEMY_MOVEMENT_CANDIDATE_BUILDERS[policyId];
  if (!builder) throw new Error(`Unknown enemy movement policy: ${policyId}`);
  const candidates = builder(ctx, enemy);
  for (const next of candidates) {
    const sentinelAvoidsBlast = enemy.abyssRole === 'sentinel' && blastThreatened(next.x, next.y);
    if (!isEnemyMovementCellBlocked(ctx, enemy, next.x, next.y) && !sentinelAvoidsBlast) return next;
  }
  return null;
}

const ENEMY_DECISION_SFA = Object.freeze({
  ENEMY_SENSE: {
    role: "shared",
    next_transitions: [
      { event: "DECIDE", action: "evaluate_enemy_perception", target_state: "ENEMY_SENSE_EVALUATED" }
    ]
  },
  ENEMY_SENSE_EVALUATED: {
    role: "shared",
    next_transitions: [
      { event: "AUTO", guard: "enemy_is_detected", action: "apply_enemy_detected", target_state: "ENEMY_SELECT_INTENT" },
      { event: "AUTO", guard: "enemy_is_passive_food", action: "set_enemy_passive_wander_mode", target_state: "ENEMY_EVALUATE_MOVE" },
      { event: "AUTO", guard: "always", action: "apply_enemy_not_detected_and_wait", target_state: "ENEMY_DONE" }
    ]
  },
  ENEMY_SELECT_INTENT: {
    role: "shared",
    next_transitions: [
      { event: "AUTO", guard: "enemy_can_arm_mirror", action: "apply_enemy_mirror", target_state: "ENEMY_DONE" },
      { event: "AUTO", guard: "enemy_can_resolve_hunger", action: "apply_enemy_hunger", target_state: "ENEMY_DONE" },
      { event: "AUTO", guard: "enemy_can_resolve_devourer", action: "apply_enemy_devourer", target_state: "ENEMY_DONE" },
      { event: "AUTO", guard: "enemy_has_pending_spell", action: "apply_enemy_pending_spell", target_state: "ENEMY_DONE" },
      { event: "AUTO", guard: "enemy_can_prepare_spell", action: "apply_enemy_prepare_spell", target_state: "ENEMY_DONE" },
      { event: "AUTO", guard: "enemy_is_adjacent", action: "set_enemy_attack_intent", target_state: "ENEMY_APPLY_INTENT" },
      { event: "AUTO", guard: "enemy_can_attempt_move", target_state: "ENEMY_EVALUATE_MOVE" },
      { event: "AUTO", guard: "always", action: "set_enemy_wait_intent", target_state: "ENEMY_DONE" }
    ]
  },
  ENEMY_EVALUATE_MOVE: {
    role: "shared",
    next_transitions: [
      { event: "AUTO", action: "evaluate_enemy_move_intent", target_state: "ENEMY_MOVE_EVALUATED" }

  },

    next_transitions: [

      { event: "AUTO", guard: "always", action: "set_enemy_wait_intent", target_state: "ENEMY_DONE" }
    ]
  },
  ENEMY_APPLY_INTENT: {
