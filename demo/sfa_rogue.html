    let menuItemsHtml = ctxGame.shopInventory.map((item, idx) => {
        const detail = item.type === 'return_scroll' ? ' — Carry it into a dungeon and press [R] to return safely.' : '';
        return `<div class="menu-item ${idx === ctxGame.shopSelectedIndex ? 'selected' : ''}">${item.name} (${item.value}g / stock:${item.stock})${detail}</div>`;
    }).join("");
    overlay.innerHTML = `<div class="menu-title">MERCHANT SHOP</div><div style='width:100%; margin-bottom:20px;'>${menuItemsHtml}</div><p style='font-size:10px; color:#888;'>[↑/↓]: Cursor | [Enter]: Purchase | [Esc]: Exit</p>`;
  } else if (overlayMode === "warp") {
    overlay.style.display = "flex";
    const destinations = ctxGame.warpDestinations.map((floor, idx) => `<div class="menu-item ${idx === ctxGame.warpSelectedIndex ? 'selected' : ''}">Enter B${floor} (new map)</div>`).join("");
    overlay.innerHTML = `<div class="menu-title">DISCOVERED WARP GATE</div><div style='width:100%; margin-bottom:20px;'>${destinations}</div><p style='font-size:10px; color:#888;'>[↑/↓]: Destination | [Enter]: Enter | [Esc]: Cancel</p>`;
  } else if (overlayMode === "inn") {
    overlay.style.display = "flex";
    overlay.innerHTML = `<div class="menu-title">TOWN INN</div><p style='font-size:13px; margin-bottom:20px;'>Stay overnight for <span style='color:#ffff00;'>20 gold</span>?<br>(Fully restores HP/Hunger and resets to Morning)</p><div class="menu-item selected">Rest and Sleep</div><p style='font-size:10px; color:#888; margin-top:20px;'>[Enter]: Pay & Stay | [Esc]: Exit</p>`;
  } else if (overlayMode === "bar") {
    overlay.style.display = "flex";
    overlay.innerHTML = `<div class="menu-title">TAVERN RUMORS</div><p style='font-size:12px; color:#e0e0f0; line-height:1.6; padding: 0 10px;'>${ctxGame.barMessage}</p><p style='font-size:11px; color:#ff00ff; margin-top:30px;'>[Esc/Enter]: Close Discussion</p>`;
  } else if (overlayMode === "home-purchase") {
    overlay.style.display = "flex";
    const affordable = ctxGame.player.gold >= HOME_CONFIG.purchasePrice;
    overlay.innerHTML = `<div class="menu-title">TOWN HOME FOR SALE</div><p style="font-size:13px;line-height:1.6;">Purchase this home for <span style="color:#ffe066;">${HOME_CONFIG.purchasePrice} gold</span>?<br>Equipment and deposited gold stored here survive rescue penalties.</p><div class="menu-item ${affordable ? 'selected' : ''}" style="${affordable ? '' : 'color:#777;'}">${affordable ? 'Purchase Home' : `Need ${HOME_CONFIG.purchasePrice - ctxGame.player.gold} more gold`}</div><p style="font-size:10px;color:#888;">[Enter]: Purchase | [Esc]: Leave</p>`;
  } else if (overlayMode === "smith-locked") {
    overlay.style.display = "flex";
    overlay.innerHTML = `<div class="menu-title">CLOSED FORGE</div><p style="font-size:12px;line-height:1.7;color:#aaa;">The master smith will return after the guardian of B${DARK_SMITH_CONFIG.unlockBossFloor} is defeated.<br>A sealed high-difficulty dungeon gate is said to awaken at the same time.</p><p style="font-size:10px;color:#888;">[Enter/Esc]: Leave</p>`;
  } else if (overlayMode === "home") {
    overlay.style.display = "flex";
    const rows = ctxGame.homeMenuEntries.map((entry, idx) => {
      let label = '';
      if (entry.kind === 'carried') label = `Store: ${coloredEquipmentName(entry.item)} / ${equipmentOptionSummary(entry.item)}`;
      else if (entry.kind === 'stored') label = `Take: ${coloredEquipmentName(entry.item)} / ${equipmentOptionSummary(entry.item)}`;
      else if (entry.kind === 'deposit_gold') label = `Deposit 10g (carried ${ctxGame.player.gold}g)`;
      else label = `Withdraw 10g (stored ${ctxGame.homeStorage.gold}g)`;
      return `<div class="menu-item ${idx === ctxGame.homeSelectedIndex ? 'selected' : ''}">${label}</div>`;
    }).join('');
    overlay.innerHTML = `<div class="menu-title">MY HOME</div><p style="font-size:11px;color:#aabbee;">Stored gold: ${ctxGame.homeStorage.gold}g / Stored equipment: ${ctxGame.homeStorage.equipment.length}</p><div style="width:100%;max-height:250px;overflow:hidden;">${rows}</div><p style="font-size:10px;color:#888;">[↑/↓]: Cursor | [Enter]: Store / Take | Gold moves in 10g units | [Esc]: Exit</p>`;
  } else if (overlayMode === "dark-smith") {
    overlay.style.display = "flex";
    const rows = ctxGame.darkSmithMenuEntries.length ? ctxGame.darkSmithMenuEntries.map((entry, idx) => {
      const option = entry.item.options[0];
      const chance = Math.round(darkSmithSuccessRate(option) * 100);
      const cost = darkSmithMaterialCost(option);
      const stat = entry.item.type === 'weapon' ? `ATK ${entry.item.atk}` : `DEF ${entry.item.def}`;
      return `<div class="menu-item ${idx === ctxGame.darkSmithSelectedIndex ? 'selected' : ''}">${entry.label}: ${coloredEquipmentName(entry.item)} [${stat}]<br><span style="font-size:9px;">${equipmentOptionSummary(entry.item)} / Cost ${cost} shard${cost === 1 ? '' : 's'} / Success ${chance}%</span></div>`;
    }).join('') : `<div class="menu-item" style="color:#777;">No equipment with an option.</div>`;
    overlay.innerHTML = `<div class="menu-title">DARK SMITH</div><p style="font-size:11px;color:#c58cff;">Forge Shards: ${ctxGame.forgeShards}. Dismantle Rare or better carried equipment for material.</p><div style="width:100%;max-height:260px;overflow:hidden;">${rows}</div><p style="font-size:10px;color:#888;">First 10 successful upgrades: 100%. Then -1% per success, minimum 10%. Material cost rises every 10 successes.<br>[↑/↓]: Cursor | [Enter]: Forge | [D]: Dismantle | [Esc]: Exit</p>`;
  } else if (overlayMode === "dark-smith-dismantle") {
    overlay.style.display = "flex";
    const rows = ctxGame.darkSmithDismantleEntries.length ? ctxGame.darkSmithDismantleEntries.map((entry, idx) => {
      const stat = entry.item.type === 'weapon' ? `ATK ${entry.item.atk}` : `DEF ${entry.item.def}`;
      return `<div class="menu-item ${idx === ctxGame.darkSmithDismantleSelectedIndex ? 'selected' : ''}">${coloredEquipmentName(entry.item)} [${stat}]<br><span style="font-size:9px;">${rarityLabel(entry.item.rarity)} / ${equipmentOptionSummary(entry.item)} / Yield ${entry.yield} shard${entry.yield === 1 ? '' : 's'}</span></div>`;
    }).join('') : `<div class="menu-item" style="color:#777;">No Rare or better carried equipment.</div>`;
    overlay.innerHTML = `<div class="menu-title">DISMANTLE EQUIPMENT</div><p style="font-size:11px;color:#ffcc66;">Forge Shards: ${ctxGame.forgeShards}. Equipped gear is never listed.</p><div style="width:100%;max-height:260px;overflow:hidden;">${rows}</div><p style="font-size:10px;color:#888;">Rare: 1 / Very Rare: 3 / Ultra Rare: 8<br>[↑/↓]: Cursor | [Enter]: Select | [Esc]: Back</p>`;
  } else if (overlayMode === "dark-smith-dismantle-confirm") {
    overlay.style.display = "flex";
    const entry = ctxGame.darkSmithDismantleEntries[ctxGame.darkSmithDismantleSelectedIndex];
    overlay.innerHTML = entry
      ? `<div class="menu-title">CONFIRM DISMANTLE</div><p style="font-size:12px;line-height:1.7;">Destroy <span style="color:#ffe066;">${entry.item.name}</span><br>and receive ${entry.yield} Forge Shard${entry.yield === 1 ? '' : 's'}?</p><p style="font-size:10px;color:#888;">[Enter]: Confirm | [Esc]: Cancel</p>`
      : `<div class="menu-title">CONFIRM DISMANTLE</div><p style="color:#777;">The selected equipment is no longer available.</p><p style="font-size:10px;color:#888;">[Esc]: Back</p>`;
  } else if (overlayMode === "blacksmith") {
    overlay.style.display = "flex";
    const rows = ctxGame.blacksmithEntries.map((entry, idx) => `<div class="menu-item ${idx === ctxGame.blacksmithSelectedIndex ? 'selected' : ''}">${entry.label}: ${coloredEquipmentName(entry.item)}<br><span style="font-size:9px;">${rarityLabel(entry.item.rarity)} / ${equipmentOptionSummary(entry.item)}</span></div>`).join('');
    overlay.innerHTML = `<div class="menu-title">BLACKSMITH</div><p style="font-size:11px;color:#ffcc66;">One random alteration costs ${BLACKSMITH_CONFIG.rerollCost} gold. You may compare and reject it, but payment is final.</p><div style="width:100%;max-height:260px;overflow:hidden;">${rows}</div><p style="font-size:10px;color:#888;">[↑/↓]: Equipment | [Enter]: Select | [Esc]: Leave</p>`;
  } else if (overlayMode === "blacksmith-kind") {
    overlay.style.display = "flex";
    const entry = ctxGame.blacksmithEntries[ctxGame.blacksmithSelectedIndex];
    const kinds = ['Reroll option', 'Reroll item rarity'];
    const rows = kinds.map((label, idx) => `<div class="menu-item ${idx === ctxGame.blacksmithKindIndex ? 'selected' : ''}">${label}</div>`).join('');
    overlay.innerHTML = `<div class="menu-title">CHOOSE ALTERATION</div><p style="font-size:11px;">${entry ? coloredEquipmentName(entry.item) : 'No equipment'} / Carried gold ${ctxGame.player.gold}</p>${rows}<p style="font-size:10px;color:#888;">Cost ${BLACKSMITH_CONFIG.rerollCost}g on roll. [Enter]: Roll | [Esc]: Back</p>`;
  } else if (overlayMode === "blacksmith-compare") {
    overlay.style.display = "flex";
    const proposal = ctxGame.blacksmithProposal;
    const original = proposal?.original; const candidate = proposal?.candidate;
    const stat = item => item?.type === 'weapon' ? `ATK ${item.atk}` : `DEF ${item?.def}`;
    overlay.innerHTML = proposal ? `<div class="menu-title">BLACKSMITH ALTERATION</div><div style="font-size:11px;line-height:1.8;text-align:left;"><b>Current</b>: ${rarityLabel(original.rarity)} ${coloredEquipmentName(original)} / ${stat(original)} / ${equipmentOptionSummary(original)}<br><b>Candidate</b>: ${rarityLabel(candidate.rarity)} ${coloredEquipmentName(candidate)} / ${stat(candidate)} / ${equipmentOptionSummary(candidate)}</div><p style="font-size:10px;color:#888;">[Enter]: Accept candidate | [Esc]: Keep current</p>` : `<div class="menu-title">BLACKSMITH ALTERATION</div><p>No candidate.</p>`;
  } else if (overlayMode === "death-summary") {
    overlay.style.display = "flex";
    const summary = ctxGame.deathSummary || { deathFloor: 0, goldLost: 0, divineGoldGranted: 0, goldAfterRescue: ctxGame.player.gold, expLost: 0, level: ctxGame.player.level, weaponName: ctxGame.player.weapon.name, armorName: ctxGame.player.armor.name, bombRange: ctxGame.player.bombRange, bombCapacity: ctxGame.player.bombCapacity, warpCount: ctxGame.discoveredWarpFloors.length };
    const divineGiftHtml = summary.divineGoldGranted > 0 ? `<div style='color:#ffe066;'>Divine aid: The gods granted ${summary.divineGoldGranted} gold. You now carry ${summary.goldAfterRescue} gold for the Inn.</div>` : "";
    overlay.innerHTML = `<h1 style='color:#ff9933; font-size:28px; margin-bottom:8px;'>YOU WERE RESCUED</h1><p style='font-size:12px; color:#aaa; margin:0 0 12px;'>The town rescue party recovered you from B${summary.deathFloor}.</p><div style='font-size:11px; line-height:1.6; text-align:left; width:88%;'><div style='color:#ff7777;'>Lost: ${summary.goldLost} gold / ${summary.expLost} current EXP / current floor progress</div>${divineGiftHtml}<div style='color:#77ff99;'>Preserved: LV ${summary.level}, ${summary.weaponName}, ${summary.armorName}</div><div style='color:#77ff99;'>Bomb RNG ${summary.bombRange}, capacity ${summary.bombCapacity}, discovered warps ${summary.warpCount}</div><div style='color:#aabbee;'>Recovery: HP 50% / Hunger 50 / Morning</div></div><p style='font-size:14px; color:#00ffcc; margin-top:24px;'>Press [ENTER] to Return to Town</p>`;
  } else if (overlayMode === "victory") {
    overlay.style.display = "flex";
    overlay.innerHTML = `<h1 style='color:#ffff00; font-size:32px; text-shadow:0 0 10px #ffff00;'>VICTORY CONCLUDED</h1><p style='font-size:13px; color:#33ff33;'>You successfully slayed the Overlord<br>and returned alive to the Town!</p><p style='font-size:14px; color:#00ffcc; margin-top:30px;'>Press [ESC] to Return to Main Title</p>`;
  } else {
    overlay.style.display = "none";
  }
}

// ==========================================
// 8. エントリポイント ＆ キーボードprojection
// ==========================================
const engine = new SFAEngine(SFA_DEFINITIONS, "FE_TITLE", context, guards, actions, render);

document.addEventListener("keydown", (e) => {
  const sfaEvent = projectKeyToEvent(engine.currentState, e.key);
  if (!sfaEvent) return;
  e.preventDefault();
  engine.transition(sfaEvent);
});
</script>
</body>
</html>
